        - deliveryFreeOfPayment
        - deliveryVsPayment
        - dividendCash
        - dividendChoice
        - dividendReinvestment
        - dividendStock
        - exercise
        - exerciseCash
        - exercisePhysical
        - expiration
        - expirationOldSecurity
        - fees
        - finalLiquidationPayment
        - fxSpot
        - incompleteRights
        - increase
        - inflowOutflowDigital
        - inflowOutflowPhysical
        - instrumentExchange
        - interest
        - internalTransfer
        - knockIn
        - knockOut
        - liquidationPayment
        - markToMarket
        - markToMarketCash
        - merger
        - netAmount
        - openFxForward
        - openNDF
        - openPayerSwap
        - openReceiverSwap
        - openSwapForwardLeg
        - other
