components:
  parameters:
    dateTypeParam:
      name: dateType
      in: query
      required: true
      description: Indicates which type of date is decisive for the data shown.
      schema:
        type: string
        enum:
          - transactionDate
          - bookingDate
          - valueDate
    endOfDayParam:
      name: eodIndicator
      in: query
      required: true
      description: Indicates if the position data is end-of-day (eod) data for the positions. If the parameter is set to false, the most recent data is shown, incl intraday changes on the position if the date is set to today.
      schema:
        type: boolean
        example: true
        default: true
    Cursor:
      name: cursor
      in: query
      description: An opaque string value used for pagination
      required: false
      schema:
        type: string
    Limit:
      name: limit
      in: query
      description: Maximum number of items to return.
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1
    CorrelationInHeader:
      in: header
      name: X-Correlation-ID
      description: Unique ID (defined by the caller) which will be reflected back in the response.
      required: true
      schema:
        type: string
    CustomerId:
      name: customerId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 35
        example: 123123456
        description: Unique and unambiguous identification used by the bank for the customer.
    Date:
      name: date
      in: query
      required: true
      schema:
        type: string
        format: date
        description: Full-date according to ISO 8601 i.e. YYYY-MM-DD format.
        example: '2019-12-31'
    AccountId:
      name: accountId
      in: path
      required: true
      schema:
        type: string
        maxLength: 35
        description: The customer's account identification, this should NOT be an IBAN.
    PositionId:
      name: positionId
      in: path
      required: true
      schema:
        type: string
        maxLength: 35
        description: Identification for the position given by the bank.
        example: 1234566-12-1
    TransactionId:
      name: transactionId
      in: path
      required: true
      schema:
        type: string
        maxLength: 35
        description: Identification for the transaction given by the bank.
        example: 1234566-12-7
  headers:
    XCorrelationId:
      description: Client defined ID from request to correlates HTTP requests between a client and server.
      schema:
        type: string
        example: f058ebd6-02f7-4d3f-942e-904344e8cde5
    NextCursor:
      description: An opaque string value, or an empty string if there are no more results.
      required: false
      schema:
        type: string
  schemas:
    Currency:
      title: Currency
      type: string
      description: ISO 4217 code
      pattern: '[A-Z]{3}'
      example: CHF
    PortfolioInformation:
      title: PortfolioInformation
      type: object
      properties:
        identification:
          title: PortfolioIdentification
          type: string
          minLength: 1
          maxLength: 35
          example: 876543219
          description: Unique and unambiguous identification for the portfolio between the portfolio owner and the portfolio servicer
        referenceCurrency:
          $ref: '#/components/schemas/Currency'
    Account:
      title: Account
      type: object
      required:
        - accountId
        - accountType
        - referenceCurrency
      properties:
        accountId:
          type: string
          maxLength: 35
          example: 876543219
          description: Unique and unambiguous identification for the account. The IBAN should NOT be the account identifier.
        accountType:
          type: string
          description: Indicatates the type of the account. If the account type is cashAccount, no information on the financial instrument is provided in the respective position in the account.
          enum:
            - cashAccount
            - safekeepingAccount
            - other
        name:
          type: string
          maxLength: 70
          description: Name of the account. It provides an additional means of identification, and is designated by the account servicer in agreement with the account owner.
          example: Household account
        referenceCurrency:
          $ref: '#/components/schemas/Currency'
        iban:
          type: string
          description: Contains the accounts Internatioinal Banking Account Number (IBAN) for a cashAccount if available.
          maxLength: 34
        designation:
          type: string
          maxLength: 70
          description: Supplementary information on the account. Designated by the account servicer.
          example: Current Account CHF
        portfolioInformation:
          $ref: '#/components/schemas/PortfolioInformation'
    Customer:
      title: Customer
      type: object
      description: Overview of the customer with the respective accounts
      required:
        - customerId
      properties:
        customerId:
          type: string
          description: Unique and unambiguous identification used by the bank for the customer.
        referenceCurrency:
          $ref: '#/components/schemas/Currency'
        accountList:
          type: array
          items:
            $ref: '#/components/schemas/Account'
    CommonErrorType:
      title: Common Error Type
      description: Error Types for CommonErrorResponse.
      type: string
      enum:
        - /problems/INVALID_PAYLOAD
        - /problems/MALFORMED_PAYLOAD
        - /problems/INVALID_TOKEN
        - /problems/EXPIRED_TOKEN
        - /problems/INSUFFICIENT_PRIVILEGES
        - /problems/NO_ACCESS_TO_RESOURCE
        - /problems/RESOURCE_DOES_NOT_EXIST
        - /problems/RESOURCE_NOT_READY
        - /problems/RESOURCE_TOO_LARGE
        - /problems/WRONG_METHOD
        - /problems/OPERATION_NOT_ALLOWED
        - /problems/TECHNICAL_ERROR
        - /problems/NOT_IMPLEMENTED
        - /problems/SERVICE_UNAVAILABLE
      example: /problems/TECHNICAL_ERROR
    CommonErrorResponse:
      title: CommonErrorResponse
      type: object
      properties:
        type:
          $ref: '#/components/schemas/CommonErrorType'
        title:
          type: string
          example: This is the general problem description
        detail:
          type: string
          example: Detailed problem description with respect to the current request
        instance:
          type: string
          example: path/to/corresponding/resource
    Statement:
      title: Statement
      type: object
      required:
        - statementDateTime
        - date
        - endOfDayIndicator
      properties:
        statementDateTime:
          type: string
          format: date-time
          example: '2018-04-13T11:11:11Z'
          description: Date and time of the statement creation (UTC Timestamp). In accordance with ISO 8601.
        date:
          type: object
          required:
            - date
            - dateType
          properties:
            date:
              type: string
              format: date
              example: '2018-04-13'
              description: Full-date according to ISO 8601 i.e. YYYY-MM-DD format.
            dateType:
              type: string
              example: transactionDate
              description: Specifies the type of date.
              enum:
                - transactionDate
                - bookingDate
                - valueDate
        endOfDayIndicator:
          type: boolean
          description: Indicates if the data displayed is end-of-day data. If true, the data is end-of-day data. If false and date is today, current (intraday) data will be displayed.
          example: true
    Date:
      title: Date
      type: string
      format: date
      pattern: \d{4}-\d{2}-\d{2}
      example: '2018-04-13'
    FinancialInstrumentType:
      title: FinancialInstrumentType
      type: string
      description: Type of the financial instrument
      example: equity
      enum:
        - cash
        - bond
        - equity
        - fund
        - index
        - commodity
        - option
        - future
        - fxForward
        - fxSwap
        - mortgage
        - fixedLoan
        - fixedDeposit
        - callableLoan
        - callableDeposit
        - interestSwap
        - totalReturnSwap
        - creditDefaultSwap
        - cryptoAsset
        - other
    Identification:
      title: FinancialInstrumentIdentification
      type: object
      properties:
        identifier:
          type: string
          maxLength: 35
          example: CH0012005267
          description: Instrument identification
        type:
          type: string
          example: isin
          description: Type of the instrument ID. isin is prefered
          enum:
            - isin
            - sedol
            - cusip
            - ric
            - tickerSymbol
            - bloomberg
            - cta
            - quick
            - wertpapier
            - dutch
            - valoren
            - sicovam
            - belgian
            - common
            - otherProprietaryIdentification
    CfiCode:
      title: CFICode
      type: string
      description: Indicates the type of the financial instrument. Must follow the ISO 10962, which is also known as CFI (classification of financial instruments). At least indicate the CFI Category (1st character) and the CFI Group (2nd character). The CFI attributes 1-4 (3rd to 6th character in the string) are optional.
      pattern: ^[A-Z]{2,6}$
      minLength: 2
      maxLength: 6
      example: ESVUFR
    FinancialInstrumentBase:
      title: FinancialInstrumentBase
      type: object
      required:
        - financialInstrumentType
        - name
      properties:
        financialInstrumentType:
          $ref: '#/components/schemas/FinancialInstrumentType'
        name:
          type: string
          maxLength: 170
          example: Novartis AG
          description: Name of the financial instrument in free format text.
        isin:
          type: string
          pattern: ^[A-Z]{2}[A-Z0-9]{9}[0-9]$
          example: CH1234567890
        identificationList:
          type: array
          items:
            $ref: '#/components/schemas/Identification'
        cfiCode:
          $ref: '#/components/schemas/CfiCode'
        currencyOfDenomination:
          $ref: '#/components/schemas/Currency'
        hasFactor:
          type: boolean
          description: Indicates if there is a factor present for this financial instrument. If this indicator is set to TRUE, but the factor attribute is not present, might indicate, that the factor cannot be delivered or is currently not available.
          example: true
        factor:
          type: number
          example: 0.85
          description: Information regarding the factor.
        inactiveIndicator:
          type: boolean
          description: Indicates if the instrument is inactive
          default: false
        additionalDetails:
          type: string
          maxLength: 70
          description: Provides additional information about the financial instrument in narrative form.
          example: Group contract number 129959961
    Cash:
      title: Cash
      description: Cash
      allOf:
        - $ref: '#/components/schemas/FinancialInstrumentBase'
    Rate:
      title: Rate
      type: object
      properties:
        rate:
          type: number
          example: 0.00125
          description: Actual decimal rate
    dayCountBasis:
      title: DayCountBasis
      type: string
      example: u30_360
      description: Interest method of the instrument
      enum:
        - act_360
        - act_365
        - act_actIcma
        - act_actIsda
        - act_actAfb
        - act_365L
        - bus_252
        - u30_360
        - u30E_360Icma
        - u30E_360Isda
        - u30E_360
        - u30U_360
    InterestRate:
      title: InterestRate
      type: object
      description: Per annum ratio of interest received or paid to the principal amount of the contract for a specific period of time.
      allOf:
        - $ref: '#/components/schemas/Rate'
        - type: object
          properties:
            currency:
              $ref: '#/components/schemas/Currency'
            type:
              type: string
              description: Indicates the type of interest
              example: fixed
              enum:
                - fixed
                - variable
                - staggered
            dayCountBasis:
              $ref: '#/components/schemas/dayCountBasis'
            paymentDate:
              allOf:
                - $ref: '#/components/schemas/Date'
                - description: Date of the next interest payment.
            paymentFrequency:
              type: string
              description: Specifies the frequency of an interest payment.
              example: quarterly
              enum:
                - annual
                - monthly
                - quarterly
                - semiAnnual
                - weekly
                - atMaturity
                - other
    MaturityDate:
      title: MaturityDate
      description: Planned date, at the time of issuance, on which an interest bearing financial instrument becomes due and principal is repaid by the issuer to the investor.
      allOf:
        - $ref: '#/components/schemas/Date'
    NextInterestPaymentDate:
      title: NextInterestPaymentDate
      description: Planned date, at the time of issuance, on which an interest bearing financial instrument becomes due and principal is repaid by the issuer to the investor.
      allOf:
        - $ref: '#/components/schemas/Date'
    IssueDate:
      title: IssueDate
      description: Date at which the security was made available.
      allOf:
        - $ref: '#/components/schemas/Date'
    Price:
      title: Price
      type: object
      required:
        - amount
        - priceType
      properties:
        priceType:
          type: string
          description: Indicates whether the price amount is depicted as actual currency amount per unit or as percentage.
          example: percentage
          enum:
            - actual
            - percentage
        value:
          type: number
          example: 12000
          description: Signed decimal number
        currency:
          $ref: '#/components/schemas/Currency'
    ConversionPrice:
      title: ConversionPrice
      description: Price of one target security in the conversion.
      allOf:
        - $ref: '#/components/schemas/Price'
    Bond:
      title: Bond
      description: Bond
      required:
        - maturityDate
        - interestRate
      allOf:
        - $ref: '#/components/schemas/FinancialInstrumentBase'
        - type: object
          properties:
            interestRate:
              $ref: '#/components/schemas/InterestRate'
            maturityDate:
              $ref: '#/components/schemas/MaturityDate'
            nextInterestPaymentDate:
              $ref: '#/components/schemas/NextInterestPaymentDate'
            issueDate:
              $ref: '#/components/schemas/IssueDate'
            conversionPrice:
              $ref: '#/components/schemas/ConversionPrice'
            currencyOfDenomination:
              $ref: '#/components/schemas/Currency'
            minimumDenomination:
              type: number
              example: 10000
              description: Indicates the minimum denomination of a security.
            minimumIncrement:
              type: number
              example: 1000
              description: Indicates the minimum tradable increments of a security.
    Equity:
      title: Equity
      description: Equity, typically referred to as shareholders' equity (or owners' equity for privately held companies), represents the amount of money that would be returned to a company's shareholders if all of the assets were liquidated and all of the company's debt was paid off in the case of liquidation
      allOf:
        - $ref: '#/components/schemas/FinancialInstrumentBase'
    Fund:
      title: Fund
      description: An investment fund is a supply of capital belonging to numerous investors used to collectively purchase securities while each investor retains ownership and control of his own shares.
      allOf:
        - $ref: '#/components/schemas/FinancialInstrumentBase'
    Index:
      title: Index
      description: A financial index produces a numeric score based on inputs such as a variety of asset prices.
      allOf:
        - $ref: '#/components/schemas/FinancialInstrumentBase'
    Commodity:
      title: Commodity
      description: Commodity
      allOf:
        - $ref: '#/components/schemas/FinancialInstrumentBase'
    ExpiryDate:
      title: ExpiryDate
      description: Date on which an order, a privilege, an entitlement or an offer terminates. For an interest bearing asset, it is the date/time at which it becomes due and has to be repaid.
      allOf:
        - $ref: '#/components/schemas/Date'
    StrikePrice:
      title: StrikePrice
      description: Predetermined price at which the holder will have to buy or sell the underlying instrument.
      allOf:
        - $ref: '#/components/schemas/Price'
    ExercisePrice:
      title: ExercisePrice
      description: Predetermined price at which the holder of a derivative will buy or sell the underlying instrument.
      allOf:
        - $ref: '#/components/schemas/Price'
    ContractSize:
      title: ContractSize
      type: number
      example: 100
      description: Contract size of the instrument
      default: 1
    FinancialInstrument:
      title: FinancialInstrument
      type: object
      oneOf:
        - $ref: '#/components/schemas/Cash'
        - $ref: '#/components/schemas/Bond'
        - $ref: '#/components/schemas/Equity'
        - $ref: '#/components/schemas/Fund'
        - $ref: '#/components/schemas/Index'
        - $ref: '#/components/schemas/Commodity'
        - $ref: '#/components/schemas/Option'
        - $ref: '#/components/schemas/Future'
        - $ref: '#/components/schemas/FxForward'
        - $ref: '#/components/schemas/FxSwap'
        - $ref: '#/components/schemas/Mortgage'
        - $ref: '#/components/schemas/MoneyMarket'
        - $ref: '#/components/schemas/InterestSwap'
        - $ref: '#/components/schemas/TotalReturnSwap'
        - $ref: '#/components/schemas/CreditDefaultSwap'
        - $ref: '#/components/schemas/CryptoAsset'
        - $ref: '#/components/schemas/Other'
      discriminator:
        propertyName: type
        mapping:
          cash: '#/components/schemas/Cash'
          bond: '#/components/schemas/Bond'
          equity: '#/components/schemas/Equity'
          fund: '#/components/schemas/Fund'
          index: '#/components/schemas/Index'
          commodity: '#/components/schemas/Commodity'
          option: '#/components/schemas/Option'
          future: '#/components/schemas/Future'
          fxForward: '#/components/schemas/FxForward'
          fxSwap: '#/components/schemas/FxSwap'
          mortgage: '#/components/schemas/Mortgage'
          fixedLoan: '#/components/schemas/MoneyMarket'
          fixedDeposit: '#/components/schemas/MoneyMarket'
          callableLoan: '#/components/schemas/MoneyMarket'
          callableDeposit: '#/components/schemas/MoneyMarket'
          interestSwap: '#/components/schemas/InterestSwap'
          totalReturnSwap: '#/components/schemas/TotalReturnSwap'
          creditDefaultSwap: '#/components/schemas/CreditDefaultSwap'
          cryptoAsset: '#/components/schemas/CryptoAsset'
          other: '#/components/schemas/Other'
    UnderlyingFinancialInstrument:
      title: UnderlyingFinancialInstrument
      description: Underlying financial instrument
      allOf:
        - $ref: '#/components/schemas/FinancialInstrument'
    Option:
      title: Option
      description: An option is a financial instrument that gives the holder the right, but not the obligation, to buy or sell an underlying asset at a predetermined price within a given timeframe
      required:
        - expiryDate
        - strikePrice
        - contractSize
        - optionType
        - optionStyle
        - underlyingFinancialInstrument
      allOf:
        - $ref: '#/components/schemas/FinancialInstrumentBase'
        - type: object
          properties:
            expiryDate:
              $ref: '#/components/schemas/ExpiryDate'
            strikePrice:
              $ref: '#/components/schemas/StrikePrice'
            exercisePrice:
              $ref: '#/components/schemas/ExercisePrice'
            contractSize:
              $ref: '#/components/schemas/ContractSize'
            optionType:
              type: string
              example: call
              enum:
                - call
                - put
              description: Specifies whether it is a Call option (right to purchase a specific underlying asset) or a Put option (right to sell a specific underlying asset).
            optionStyle:
              type: string
              example: american
              enum:
                - american
                - european
                - bermudan
                - asian
              description: Specifies how an option can be exercised.
            underlyingFinancialInstrument:
              $ref: '#/components/schemas/UnderlyingFinancialInstrument'
    Future:
      title: Future
      description: Futures are derivative financial contracts that obligate parties to buy or sell an asset at a predetermined future date and price.
      required:
        - expiryDate
        - contractSize
        - underlyingFinancialInstrument
      allOf:
        - $ref: '#/components/schemas/FinancialInstrumentBase'
        - type: object
          properties:
            expiryDate:
              $ref: '#/components/schemas/ExpiryDate'
            contractSize:
              $ref: '#/components/schemas/ContractSize'
            underlyingFinancialInstrument:
              $ref: '#/components/schemas/UnderlyingFinancialInstrument'
            exercisePrice:
              $ref: '#/components/schemas/ExercisePrice'
    CurrencyAmount:
      title: CurrencyAmount
      type: object
      description: Amount denoted in a given currency
      required:
        - value
        - currency
      properties:
        amount:
          type: number
          example: 12000
          description: Signed amount
        currency:
          $ref: '#/components/schemas/Currency'
    FxForward:
      title: FxForward
      description: A forward contract is a customized contract between two parties to buy or sell currencies at a specified price on a future date.
      required:
        - amountPaid
        - amountReceived
        - maturityDate
      allOf:
        - $ref: '#/components/schemas/FinancialInstrumentBase'
        - type: object
          properties:
            amountPaid:
              title: AmountPaid
              description: Amount paid at the maturity of a contract (i.e. FX forward)
              allOf:
                - $ref: '#/components/schemas/CurrencyAmount'
            amountReceived:
              title: amountReceived
              description: Amount received at the maturity of a contract (i.e. FX forward)
              allOf:
                - $ref: '#/components/schemas/CurrencyAmount'
            maturityDate:
              $ref: '#/components/schemas/MaturityDate'
    FxSwap:
      title: FxSwap
      description: A foreign currency swap is an agreement between two foreign parties to swap interest payments on a loan made in one currency for interest payments on a loan made in another currency.
      required:
        - amountPaid
        - amountReceived
        - maturityDate
      allOf:
        - $ref: '#/components/schemas/FinancialInstrumentBase'
        - type: object
          properties:
            nearAmountPaid:
              title: NearAmountPaid
              description: Amount paid at the earlier part of an FX swap
              allOf:
                - $ref: '#/components/schemas/CurrencyAmount'
            nearAmountReceived:
              title: NearAmountReceived
              description: Amount received at the earlier part of an FX swap
              allOf:
                - $ref: '#/components/schemas/CurrencyAmount'
            farAmountPaid:
              title: FarAmountPaid
              description: Amount paid at the maturity of an FX swap
              allOf:
                - $ref: '#/components/schemas/CurrencyAmount'
            farAmountReceived:
              title: FarAmountReceived
              description: Amount received at the maturity of an FX swap
              allOf:
                - $ref: '#/components/schemas/CurrencyAmount'
            maturityDate:
              $ref: '#/components/schemas/MaturityDate'
            nearMaturityDate:
              title: NearMaturityDate
              description: Date of the settlement of the near leg
              allOf:
                - $ref: '#/components/schemas/MaturityDate'
    PrincipalAmount:
      title: PrincipalAmount
      description: Indication of the cash values to be settled as of the start and maturity date of the contract.
      allOf:
        - $ref: '#/components/schemas/CurrencyAmount'
    Mortgage:
      title: Mortgage
      description: A mortgage is a type of loan used to purchase or maintain a home, plot of land, or other types of real estate.
      required:
        - principalAmount
        - interestRate
      allOf:
        - $ref: '#/components/schemas/FinancialInstrumentBase'
        - type: object
          properties:
            principalAmount:
              $ref: '#/components/schemas/PrincipalAmount'
            interestRate:
              $ref: '#/components/schemas/InterestRate'
    MoneyMarket:
      title: MoneyMarket
      description: Money market
      required:
        - principalAmount
        - interestRate
      allOf:
        - $ref: '#/components/schemas/FinancialInstrumentBase'
        - type: object
          properties:
            principalAmount:
              $ref: '#/components/schemas/PrincipalAmount'
            interestRate:
              $ref: '#/components/schemas/InterestRate'
            maturityDate:
              $ref: '#/components/schemas/MaturityDate'
    InterestSwap:
      title: InterestSwap
      description: An interest rate swap is a forward contract in which one stream of future interest payments is exchanged for another based on a specified principal amount.
      required:
        - principalAmount
        - interestRatePaid
        - interestRateReceived
        - maturityDate
      allOf:
        - $ref: '#/components/schemas/FinancialInstrumentBase'
        - type: object
          properties:
            principalAmount:
              $ref: '#/components/schemas/PrincipalAmount'
            interestRatePaid:
              title: InterestRatePaid
              description: Per annum ratio of interest paid to the principal amount of the financial instrument for a specific period of time.
              allOf:
                - $ref: '#/components/schemas/InterestRate'
            interestRateReceived:
              title: InterestRateReceived
              description: Per annum ratio of interest received to the principal amount of the financial instrument for a specific period of time.
              allOf:
                - $ref: '#/components/schemas/InterestRate'
            maturityDate:
              $ref: '#/components/schemas/MaturityDate'
    TotalReturnSwap:
      title: TotalReturnSwap
      description: A swap agreement in which Party A pays fees to Party B in exchange for the income or return generated by an asset owned by Party B.
      required:
        - principalAmount
        - interestRate
        - underlyingFinancialInstrument
      allOf:
        - $ref: '#/components/schemas/FinancialInstrumentBase'
        - type: object
          properties:
            principalAmount:
              $ref: '#/components/schemas/PrincipalAmount'
            maturityDate:
              $ref: '#/components/schemas/MaturityDate'
            underlyingFinancialInstrument:
              $ref: '#/components/schemas/UnderlyingFinancialInstrument'
    CreditDefaultSwap:
      title: CreditDefaultSwap
      description: A derivative product which serves as a form of insurance against the default of an underlying borrower or debt instrument
      required:
        - principalAmount
      allOf:
        - $ref: '#/components/schemas/FinancialInstrumentBase'
        - type: object
          properties:
            principalAmount:
              $ref: '#/components/schemas/PrincipalAmount'
            maturityDate:
              $ref: '#/components/schemas/MaturityDate'
            underlyingFinancialInstrument:
              $ref: '#/components/schemas/UnderlyingFinancialInstrument'
    CryptoAsset:
      title: CryptoAsset
      description: Crypto Asset
      allOf:
        - $ref: '#/components/schemas/FinancialInstrumentBase'
    Other:
      title: Other
      type: object
      allOf:
        - $ref: '#/components/schemas/FinancialInstrumentBase'
    Quantity:
      title: Quantity
      type: object
      required:
        - value
        - type
      properties:
        quantityType:
          type: string
          description: Specifies the type of the amount
          example: nominal
          enum:
            - unit
            - faceAmount
            - amortisedValue
            - digitalTokenUnit
        value:
          type: number
          example: 12000
          description: Signed decimal number
    ForeignExchangeRate:
      title: ForeignExchangeRate
      type: object
      allOf:
        - $ref: '#/components/schemas/Rate'
        - type: object
          properties:
            sourceCurrency:
              $ref: '#/components/schemas/Currency'
            targetCurrency:
              $ref: '#/components/schemas/Currency'
    ValuationForeignExchangeRate:
      title: ValuationForeignExchangeRate
      allOf:
        - $ref: '#/components/schemas/ForeignExchangeRate'
        - type: object
          properties:
            rateDate:
              description: Date of rate.
              allOf:
                - $ref: '#/components/schemas/Date'
            sourceOfRate:
              type: string
              maxLength: 70
              description: Indicates the source of the (market) price
              example: Reuters 4 o'clock
    Valuation:
      title: Valuation
      type: object
      description: Detailed information about the valuation of a position
      required:
        - value
      properties:
        valueInPositionCurrency:
          $ref: '#/components/schemas/CurrencyAmount'
        valueInReferenceCurrency:
          $ref: '#/components/schemas/CurrencyAmount'
        foreignExchangeRate:
          $ref: '#/components/schemas/ValuationForeignExchangeRate'
        valuationDate:
          $ref: '#/components/schemas/Date'
    ValuationPrice:
      title: ValuationPrice
      allOf:
        - $ref: '#/components/schemas/Price'
        - type: object
          properties:
            priceDate:
              description: Date of the price.
              allOf:
                - $ref: '#/components/schemas/Date'
            sourceOfPrice:
              type: string
              maxLength: 70
              description: Indicates the source of the (market)price
              example: SIX Swiss Exchange
    valuationForeignExchangeRate:
      title: ValuationForeignExchangeRate
      allOf:
        - $ref: '#/components/schemas/ForeignExchangeRate'
        - type: object
          properties:
            rateDate:
              description: Date of rate.
              allOf:
                - $ref: '#/components/schemas/Date'
            sourceOfRate:
              type: string
              maxLength: 70
              description: Indicates the source of the (market) price
              example: Reuters 4 o'clock
    Position:
      title: Position
      type: object
      required:
        - positionId
        - positionDate
        - financialInstrument
        - account
        - quantity
        - valuation
      properties:
        positionId:
          type: string
          maxLength: 35
          example: 876543219
          description: Identification for the position given by the bank
        positionDate:
          title: PositionDate
          description: Date at which the position was valuated.
          allOf:
            - $ref: '#/components/schemas/Date'
        financialInstrument:
          $ref: '#/components/schemas/FinancialInstrument'
        account:
          $ref: '#/components/schemas/Account'
        quantity:
          $ref: '#/components/schemas/Quantity'
        valuation:
          $ref: '#/components/schemas/Valuation'
        positionName:
          type: string
          maxLength: 80
          example: Stark Industries Inc.
          description: Name of the position.
        currency:
          $ref: '#/components/schemas/Currency'
        price:
          $ref: '#/components/schemas/ValuationPrice'
        foreignExchangeRate:
          $ref: '#/components/schemas/valuationForeignExchangeRate'
        costPrice:
          $ref: '#/components/schemas/Price'
        costForeignExchangeRate:
          $ref: '#/components/schemas/ForeignExchangeRate'
        safekeepingPlace:
          type: string
          pattern: '[A-Z]{6,6}[A-Z2-9][A-NP-Z0-9]([A-Z0-9]{3,3}){0,1}'
          example: INSECHZZXXX
          description: BIC of the place where the securities are safe-kept, physically or notionally
        additionalCustodianInformation:
          type: string
          pattern: '[A-Z]{6,6}[A-Z2-9][A-NP-Z0-9]([A-Z0-9]{3,3}){0,1}'
          example: INSECHZZXXX
          description: Used for special use cases where safekeepingPlace is not suffienct. BIC of the place where the securities are safe-kept, physically or notionally
        accruedInterest:
          $ref: '#/components/schemas/CurrencyAmount'
        numberOfDaysAccrued:
          type: integer
          example: 34
          description: Number of days used for calculating the accrued interest amount.
        blockedQuantity:
          allOf:
            - $ref: '#/components/schemas/Quantity'
            - description: Indicates the amount of the position which is blocked, i.e. not freely available, e.g. for trading. The amount is of the same amountType as the position itself.
        additionalDetails:
          type: string
          maxLength: 70
          description: Provides additional information on the position.
          example: Belongs to contract 129959959
    AccountDetails:
      title: AccountDetails
      allOf:
        - $ref: '#/components/schemas/Account'
        - type: object
          required:
            - positionList
          properties:
            externalReference:
              type: string
              maxLength: 35
              example: 987-654-321
              description: Account reference used by a bank external party, e.g. PMS
            positionList:
              type: array
              description: A list of positions
              items:
                $ref: '#/components/schemas/Position'
    CustomerAccountDetails:
      title: CustomerAccountDetails
      type: object
      required:
        - customerId
      allOf:
        - $ref: '#/components/schemas/Customer'
        - type: object
          properties:
            accountDetailsList:
              type: array
              items:
                $ref: '#/components/schemas/AccountDetails'
    CustomerPositionStatement:
      title: CustomerPositionStatement
      type: object
      properties:
        statement:
          $ref: '#/components/schemas/Statement'
        customer:
          $ref: '#/components/schemas/CustomerAccountDetails'
    AccountPositionStatement:
      title: AccountPositionStatement
      type: object
      properties:
        statement:
          $ref: '#/components/schemas/Statement'
        accountDetails:
          $ref: '#/components/schemas/AccountDetails'
    TransactionType:
      title: TransactionType
      type: string
      description: Type of the transaction
      example: securitiesExchange
      enum:
        - securitiesExchange
        - cash
        - fees
        - credit
        - fx
        - taxes
        - corporateActions
        - fiduciary
        - moneyMarket
        - securitiesTransfer
        - physical
        - otc
        - others
    TransactionSubtype:
      title: TransactionSubType
