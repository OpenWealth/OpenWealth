        - prepayment
        - publicOffer
        - receiveFreeOfPayment
        - receiveFromFund
        - receiveSecurityFromFund
        - receiveVsPayment
        - redemption
        - redemptionPartial
        - redemptionPrior
        - reductionOfNominal
        - resetPayment
        - revenue
        - rightDistribution
        - sell
        - sellBarrier
        - sellDigital
        - sellToClose
        - sellToOpen
        - spinOff
        - split
        - subscription
        - swapSpotLeg
        - taxCorrections
        - taxes
        - transferMetalPhysical
        - unwind
        - variationMargin
    TriggeringFinancialInstrument:
      title: TriggereingFinancialInstrument
      description: Security triggering/causing the transaction.
      allOf:
        - $ref: '#/components/schemas/FinancialInstrument'
        - type: object
          properties:
            triggeringQuantity:
              $ref: '#/components/schemas/Quantity'
    MovementType:
      title: MovementType
      type: string
      description: Describes which kind of movement is reported from a banks perspective.
      example: security
      enum:
        - security
        - cash
        - revenue
        - accruedInterest
        - stampDuty
        - withholdingTax
        - additionalWithholdingTax
        - premium
        - capitalGainTax
        - financialTransactionTax
        - otherTaxes
        - transactionFee
        - brokerageFee
        - managementFee
        - courtage
        - custodyFee
        - exchangeFee
        - thirdPartyFee
        - otherFee
        - others
    Movement:
      title: Movement
      type: object
      description: Describes a single movement/booking/flow within a transaction. Every transaction contains in the minimum one movement.
      required:
        - movementType
        - movementDate
        - financialInstrument
        - account
        - quantity
      properties:
        movementType:
          $ref: '#/components/schemas/MovementType'
        movementDate:
          title: MovementDate
          description: Date when the movement was confirmed in the source ledger. This typically corresponds with the booking date (or posting date) by the bank.
          allOf:
            - $ref: '#/components/schemas/Date'
        financialInstrument:
          $ref: '#/components/schemas/FinancialInstrument'
        account:
          $ref: '#/components/schemas/Account'
        quantity:
          $ref: '#/components/schemas/Quantity'
        currency:
          $ref: '#/components/schemas/Currency'
        valueDate:
          title: ValueDate
          description: Date when calculating economic benefit for a cash amount.
          allOf:
            - $ref: '#/components/schemas/Date'
        positionId:
          type: string
          maxLength: 35
          description: Identification for the position given by the bank.
          example: 1234566-12-1
        price:
          $ref: '#/components/schemas/Price'
        foreignExchangeRate:
          $ref: '#/components/schemas/ForeignExchangeRate'
        movementTypeAdditionalInformation:
          type: string
          maxLength: 35
          example: Fees for Reporting Service
          description: Provides further details on an informative level, which goes beyond the granularity of the movementType.
    PostingAmount:
      title: PostingAmount
      type: object
      required:
        - amount
        - currency
        - account
      description: Total amount of money that is to be/was posted to the account in the account currency.
      properties:
        amount:
          type: number
          description: Signed amount of the cash transaction
          example: 13023
        currency:
          $ref: '#/components/schemas/Currency'
        account:
          $ref: '#/components/schemas/Account'
    Transaction:
      title: Transaction
      type: object
      required:
        - transactionId
        - transactionType
        - transactionSubtype
        - transactionDate
        - customerId
        - reversalIndicator
      properties:
        transactionType:
          $ref: '#/components/schemas/TransactionType'
        transactionSubtype:
          $ref: '#/components/schemas/TransactionSubtype'
        transactionId:
          type: string
          maxLength: 35
          example: 987654321
          description: Transaction ID given by the bank
        transactionDate:
          title: TransactionDate
          description: Date of transaction entity
          allOf:
            - $ref: '#/components/schemas/Date'
        customerId:
          type: string
          description: Unique and unambiguous identification used by the bank for the customer.
        reversalIndicator:
          description: Indicates whether it is the reversal of a previously reported movement.
          type: boolean
          default: false
        placeOfTrade:
          type: object
          description: Market in which a trade transaction is to be or has been executed.
          properties:
            marketIdentificationCode:
              type: string
              maxLength: 4
              description: Market Identifier Code. Identification of a financial market, as stipulated in the norm ISOMarket Identifier Code. Identification of a financial market, as stipulated in the norm ISO 10383 "Codes for exchanges and market identifications".
              example: XSWX
            marketDescription:
              type: string
              maxLength: 70
              description: Description of the market when no Market Identification Code is available.
              example: OTC
        reversedtransactionId:
          type: string
          maxLength: 35
          description: States the identification of the transaction that was reversed
          example: 2134123415
        tradeDate:
          title: tradeDate
          description: Specifies the date/time on which the trade was executed.
          allOf:
            - $ref: '#/components/schemas/Date'
        settlementDate:
          title: SettlementDate
          description: Date and time at which the securities are to be delivered or received.
          allOf:
            - $ref: '#/components/schemas/Date'
        triggeringFinancialInstrument:
          $ref: '#/components/schemas/TriggeringFinancialInstrument'
        movementList:
          type: array
          description: List of movements belonging to a transaction from a banks perspective
          items:
            $ref: '#/components/schemas/Movement'
        postingAmountList:
          type: array
          description: List of total amounts of money that is to be/was posted to respective accounts in the account currency.
          items:
            $ref: '#/components/schemas/PostingAmount'
        settlementCurrency:
          $ref: '#/components/schemas/Currency'
        transactionAdditionalDetails:
          type: string
          maxLength: 70
          description: Provides additional details on the transaction which can not be included within the structured fields of the message.
          example: Replaces transaction nr. 12234567489
    TransactionStatement:
      title: TransactionStatement
      type: object
      properties:
        statement:
          $ref: '#/components/schemas/Statement'
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'
