            nextCursor:
              $ref: '../../Globals/V3/Headers/X-Next-Cursor.yaml'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: 'Resources/Customer.yaml'
        '400':
          $ref: '../../Globals/V3/Responses/400.yaml'
        '401':
          $ref: '../../Globals/V3/Responses/401.yaml'
        '403':
