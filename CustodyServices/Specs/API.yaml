        '400':
          $ref: '../../Globals/V3/Responses/400.yaml'
        '401':
          $ref: '../../Globals/V3/Responses/401.yaml'
        '403':
          $ref: '../../Globals/V3/Responses/403.yaml'
        '404':
          $ref: '../../Globals/V3/Responses/404.yaml'
        '405':
