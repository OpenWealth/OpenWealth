        '401':
          $ref: '../../Globals/V3/Responses/401.yaml'
        '403':
          $ref: '../../Globals/V3/Responses/403.yaml'
        '404':
          $ref: '../../Globals/V3/Responses/404.yaml'
        '405':
          $ref: '../../Globals/V3/Responses/405.yaml'
        '500':
          $ref: '../../Globals/V3/Responses/500.yaml'
        '501':
          $ref: '../../Globals/V3/Responses/501.yaml'
        '503':
          $ref: '../../Globals/V3/Responses/503.yaml'

  /customers/{customerId}/positions:
    get:
      tags:
