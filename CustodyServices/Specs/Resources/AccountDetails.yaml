title: AccountDetails
allOf:
  - $ref: "Account.yaml"
  - type: object
    required:
      - positionList
    properties:
      externalReference:
        type: string
        maxLength: 35
        example: 987-654-321
        description: Account reference used by a bank external party, e.g. PMS
      positionList:
        type: array
        description: A list of positions
        items:
          $ref: "Position.yaml"
