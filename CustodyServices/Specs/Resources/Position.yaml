title: Position
type: object
description: Position entity.
required:
  - id
  - financialInstrument
  - account
properties:
  id:
    type: string
    maxLength: 128
    example: 876-543219
    description: Identification for the position given by the bank.
  financialInstrument:
    $ref: 'FinancialInstrument.yaml'
  account:
    $ref: 'Account.yaml'
  name:
    type: string
    maxLength: 80
    example: Stark Industries Inc.
    description: Name of the position.
  currency:
    $ref: '../../../Globals/V3/Types/Currency.yaml'
  safekeepingPlace:
    type: string
    pattern: '[A-Z]{6,6}[A-Z2-9][A-NP-Z0-9]([A-Z0-9]{3,3}){0,1}'
    example: INSECHZZXXX
    description: BIC of the place where the securities are safe-kept, physically or notionally.
  additionalCustodianInformation:
    type: string
    pattern: '[A-Z]{6,6}[A-Z2-9][A-NP-Z0-9]([A-Z0-9]{3,3}){0,1}'
    example: INSECHZZXXX
    description: Used for special use cases where safekeepingPlace is not sufficient. BIC of the place where the securities are safe-kept, physically or notionally.
  additionalDetails:
    type: string
    maxLength: 70
    description: Provides additional information on the position.
    example: Belongs to contract 129959959
