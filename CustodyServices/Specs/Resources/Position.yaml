title: Position
type: object
required: 
  - positionId
  - quantity
  - financialInstrument
  - account
  - valuation
properties:
  positionId:
    type: string
    maxLength: 35
    example: 876543219
    description: Identification for the position given by the bank
  positionDate:
    title: PositionDate
    description: Date at which the position was valuated.
    allOf:
      - $ref: '../../../Globals/Types/Date.yaml'
  externalReference:
    type: string
    maxLength: 35
    example: 987-654-321
    description: Reference used by the external party, e.g. Portfolio Management Systems
  financialInstrument:
    $ref: 'FinancialInstrument.yaml'
  account:
    $ref: 'Account.yaml'
  quantity:
    $ref: '../Types/Quantity.yaml'
  positionName:
    type: string
    maxLength: 80
    example: Stark Industries Inc.
    description: Name of the position.
  currency:
    $ref: '../../../Globals/Types/Currency.yaml'
  price:
    $ref: '../Types/ValuationPrice.yaml'
  foreignExchangeRate:
    $ref: '../Types/valuationForeignExchangeRate.yaml'
  costPrice:
    $ref: '../Types/Price.yaml'
  costForeignExchangeRate:
    $ref: '../Types/ForeignExchangeRate.yaml'
  valuation:
    $ref: '../Types/Valuation.yaml'
  safekeepingPlace:
    type: string
    pattern: '[A-Z]{6,6}[A-Z2-9][A-NP-Z0-9]([A-Z0-9]{3,3}){0,1}'
    example: INSECHZZXXX
    description: 'BIC of the place where the securities are safe-kept, physically or notionally'
  additionalCustodianInformation:
    type: string
    pattern: '[A-Z]{6,6}[A-Z2-9][A-NP-Z0-9]([A-Z0-9]{3,3}){0,1}'
    example: INSECHZZXXX
    description: 'Used for special use cases where safekeepingPlace is not suffienct. BIC of the place where the securities are safe-kept, physically or notionally'
  accruedInterest:
    $ref: '../Types/CurrencyAmount.yaml'
  numberOfDaysAccrued:
    type: integer
    example: 34
    description: Number of days used for calculating the accrued interest amount.
  blockedQuantity:
    allOf:
      - $ref: '../Types/Quantity.yaml'
      - description: Indicates the amount of the position which is blocked, i.e. not freely available, e.g. for trading. The amount is of the same amountType as the position itself.
  additionalDetails:
    type: string
    maxLength: 70
    description: Provides additional information on the position.
    example: Belongs to contract 129959959