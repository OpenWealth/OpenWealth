title: FxOption
description: An FX option is a contract that gives the buyer the right, but not the obligation, to buy or sell a certain currency at a specified exchange rate on or before a specified date. For this right, a premium is paid to the seller.
required:
  - expiryDateTime
  - underlyingAmount
  - counterAmount
  - premium
  - optionType
  - optionStyle
allOf:
  - $ref: 'FinancialInstrumentBase.yaml'
  - type: object
    properties:
      expiryDateTime:
        description: Date on which an order, a privilege, an entitlement or an offer terminates. For an interest bearing asset, it is the date/time at which it becomes due and has to be repaid.
        $ref: '../../../../Globals/Types/DateTime.yaml'
      underlyingAmount:
        description: This field specifies the underlying currency and amount of the contract. The underlying currency is the currency which is to be exchanged for the counter currency.
        $ref: '../../Types/CurrencyAmount.yaml'
      counterAmount:
        description: This field specifies the counter currency and amount of the contract. The counter currency is the currency which is to be exchanged for the underlying currency.
        $ref: '../../Types/CurrencyAmount.yaml'
      premium:
        $ref: '../../Types/CurrencyAmount.yaml'
      optionType:
        $ref: '../../Types/OptionType.yaml'
      optionStyle:
        $ref: '../../Types/OptionStyle.yaml'
