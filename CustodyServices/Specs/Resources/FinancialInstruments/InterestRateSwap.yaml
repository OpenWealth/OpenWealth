title: InterestRateSwap
description: An interest rate swap is a forward contract in which one stream of future interest payments is exchanged for another based on a specified principal amount.
required:
  - principalAmount
  - interestRatePaid
  - interestRateReceived
  - maturityDate
allOf:
  - $ref: 'FinancialInstrumentBase.yaml'
  - type: object
    properties:
      principalAmount:
        description: Indication of the cash values to be settled as of the start and maturity date of the contract.
        $ref: '../../Types/CurrencyAmount.yaml'
      interestRatePaid:
        description: Per annum ratio of interest paid to the principal amount of the financial instrument for a specific period of time.
        $ref: '../../Types/InterestRate.yaml'
      interestRateReceived:
        description: Per annum ratio of interest received to the principal amount of the financial instrument for a specific period of time.
        $ref: '../../Types/InterestRate.yaml'
      maturityDate:
        description: Planned date, at the time of issuance, on which an interest bearing financial instrument becomes due and principal is repaid by the issuer to the investor.
        $ref: '../../../../Globals/Types/Date.yaml'
