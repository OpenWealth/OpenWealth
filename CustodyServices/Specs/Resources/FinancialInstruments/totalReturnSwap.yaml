title: TotalReturnSwap
description: A swap agreement in which Party A pays fees to Party B in exchange for the income or return generated by an asset owned by Party B.
required:
  - principalAmount
  - interestRate
  - underlyingFinancialInstrument
allOf:
  - $ref: 'financialInstrumentBase.yaml'
  - type: object
    properties:
      principalAmount:
        $ref: '../../Types/principalAmount.yaml'
      maturityDate:
        $ref: '../../Types/maturityDate.yaml'
      underlyingFinancialInstrument:
        $ref: '../underlyingFinancialInstrument.yaml'
