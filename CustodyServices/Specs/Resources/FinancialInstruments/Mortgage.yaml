title: Mortgage
description: A mortgage is a type of loan used to purchase or maintain a home, plot of land, or other types of real estate.
required:
  - principalAmount
  - interestRate
allOf:
  - $ref: 'FinancialInstrumentBase.yaml'
  - type: object
    properties:
      principalAmount:
        description: |
          Principal is frequently the term used to refer to the original sum borrowed in a loan or put into an investment.
          The principal amount serves as the foundation for calculating interest, the returns on an investment, amortization schedules, and other parts of a transaction.
        $ref: '../../Types/CurrencyAmount.yaml'
      interestRate:
        $ref: '../../Types/InterestRate.yaml'
      limit:
        type: number
        example: 100000
        description: Maximum principal amount allowed by the credit contract
