title: Bond
description: Bond
required:
  - maturityDate
  - interestRate
allOf:
  - $ref: 'financialInstrumentBase.yaml'
  - type: object
    properties:
      interestRate:
        $ref: '../../Types/interestRate.yaml'
      maturityDate:
        description: Planned date, at the time of issuance, on which an interest bearing financial instrument becomes due and principal is repaid by the issuer to the investor.
        $ref: '../../../../Globals/Types/date.yaml'
      nextInterestPaymentDate:
        description: Planned date, at the time of issuance, on which an interest bearing financial instrument becomes due and principal is repaid by the issuer to the investor.
        $ref: '../../../../Globals/Types/date.yaml'
      issueDate:
        description: Date at which the security was made available.
        $ref: '../../../../Globals/Types/date.yaml'
      conversionPrice:
        description: Price of one target security in the conversion.
        $ref: '../../Types/price.yaml'
      currencyOfDenomination:
        $ref: '../../../../Globals/Types/currency.yaml'
      minimumDenomination:
        type: number
        example: 10000
        description: Indicates the minimum denomination of a security.
      minimumIncrement:
        type: number
        example: 1000
        description: Indicates the minimum tradable increments of a security.
