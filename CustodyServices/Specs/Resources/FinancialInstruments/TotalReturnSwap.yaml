title: TotalReturnSwap
description: A swap agreement in which Party A pays fees to Party B in exchange for the income or return generated by an asset owned by Party B. If the private client is party A and the bank party B the property 'interestRatePaid' should be used to describe the interest, for opposite parties 'interestRateReceived',
required:
  - principalAmount
  - underlyingFinancialInstrument
allOf:
  - $ref: 'FinancialInstrumentBase.yaml'
  - type: object
    properties:
      principalAmount:
        description: |
          Principal is frequently the term used to refer to the original sum borrowed in a loan or put into an investment.
          The principal amount serves as the foundation for calculating interest, the returns on an investment, amortization schedules, and other parts of a transaction.
        $ref: '../../Types/CurrencyAmount.yaml'
      interestRatePaid:
        description: Per annum ratio of interest paid to the principal amount of the financial instrument for a specific period of time.
        $ref: '../../Types/InterestRate.yaml'
      interestRateReceived:
        description: Per annum ratio of interest received to the principal amount of the financial instrument for a specific period of time.
        $ref: '../../Types/InterestRate.yaml'
      maturityDate:
        description: Planned date, at the time of issuance, on which an interest bearing financial instrument becomes due and principal is repaid by the issuer to the investor.
        $ref: '../../../../Globals/V3/Types/Date.yaml'
      underlyingFinancialInstrument:
        $ref: '../FinancialInstrument.yaml'
