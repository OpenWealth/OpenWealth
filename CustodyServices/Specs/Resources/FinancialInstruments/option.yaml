title: Option
description: An option is a financial instrument that gives the holder the right, but not the obligation, to buy or sell an underlying asset at a predetermined price within a given timeframe
required:
  - strikePrice
  - contractSize
  - optionType
  - optionStyle
  - underlyingFinancialInstrument
allOf:
  - $ref: 'financialInstrumentBase.yaml'
  - type: object
    properties:
      expiryDate:
        description: Date on which an order, a privilege, an entitlement or an offer terminates. For an interest bearing asset, it is the date at which it becomes due and has to be repaid.
        $ref: '../../../../Globals/Types/date.yaml'
      strikePrice:
        description: Predetermined price at which the holder will have to buy or sell the underlying instrument.
        $ref: '../../Types/price.yaml'
      exercisePrice:
        description: Predetermined price at which the holder of a derivative will buy or sell the underlying instrument.
        $ref: '../../Types/price.yaml'
      contractSize:
        $ref: '../../Types/contractSize.yaml'
      optionType:
        $ref: '../../Types/optionType.yaml'
      optionStyle:
        $ref: '../../Types/optionStyle.yaml'
      underlyingFinancialInstrument:
        $ref: '../financialInstrument.yaml'
