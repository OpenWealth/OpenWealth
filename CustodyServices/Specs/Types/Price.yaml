title: Price
type: object
required:
  - amount
  - priceType
properties:
  priceType:
    type: string
    description: Indicates whether the price amount is depicted as actual currency amount per unit or as percentage.
    example: percentage
    enum:
      - actual
      - percentage
  value:
    type: number
    example: 12000
    description: Signed decimal number
  currency:
    $ref: "../../../Globals/Types/Currency.yaml"
