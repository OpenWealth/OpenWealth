title: Quantity
type: object
required:
  - value
  - type
properties:
  type:
    type: string
    description: Specifies the type of the amount
    example: nominal
    enum:
      - unit
      - faceAmount
      - amortisedValue
      - digitalTokenUnit
  value:
    type: number
    example: 12000
    description: Signed decimal number
