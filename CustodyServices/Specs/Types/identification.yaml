title: Identification
type: object
required:
  - identifierType
  - identifier
properties:
  identifierType:
    type: string
    example: isin
    description: Type of the identifier
    enum:
      - isin
      - sedol
      - cusip
      - ric
      - tickerSymbol
      - bloomberg
      - cta
      - quick
      - wertpapier
      - dutch
      - valoren
      - sicovam
      - belgian
      - common
      - iso3
      - otherProprietaryIdentification
  identifier:
    type: string
    maxLength: 128
    example: CH0012005267
    description: Identification value
