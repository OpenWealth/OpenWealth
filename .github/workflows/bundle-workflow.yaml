name: Bundle workflow
# description: Check specifications for SFTI's openapi rules.
on:
  pull_request:
    types: [opened, synchronize, reopened, labeled] # Trigger on PR actions like opening or updating a PR
    branches:
      - main # Only triggers for pull requests targeting the main branch

env:
  REDOCLY_VERSION: '1.25.3'
  API_NAME: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  bundle-api:
    if: contains(github.event.pull_request.labels.*.name, 'custody') || contains(github.event.pull_request.labels.*.name, 'trading') || contains(github.event.pull_request.labels.*.name, 'customer')
    runs-on: ubuntu-latest
    outputs:
      API: ${{ steps.var.outputs.API }}
      NEW_SHA: ${{ steps.new_sha.outputs.NEW_SHA }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }} # Checkout the head branch of the PR

      - name: Set API of subject from label
        if: contains(github.event.pull_request.labels.*.name, 'custody')
        run: echo "API_NAME=custody" >> $GITHUB_ENV

      - name: Set API of subject from label
        if: contains(github.event.pull_request.labels.*.name, 'trading')
        run: echo "API_NAME=trading" >> $GITHUB_ENV

      - name: Set API of subject from label
        if: contains(github.event.pull_request.labels.*.name, 'customer')
        run: echo "API_NAME=customer" >> $GITHUB_ENV

      - name: Get Pull Request Labels and set variables
        id: var
        run: |
          apiFile="src/${API_NAME}/API.yaml"
          apiBundledFile="${API_NAME}API.yaml"
          echo "API"=$API_NAME >> $GITHUB_OUTPUT
          echo "API_FILE"=$apiFile >> $GITHUB_OUTPUT
          echo "API_BUNDLED_FILE"=$apiBundledFile >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        with:
          node-version: latest

      # Install Redocly CLI
      - name: Install Redocly CLI
        run: npm install -g @redocly/cli

      # Run the Redocly bundle command
      - name: Bundle API docs
        run: redocly bundle ${{ steps.var.outputs.API_FILE }} --output ${{ steps.var.outputs.API_BUNDLED_FILE }}

      # Configure Git
      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      # Check if there are changes to commit
      - name: Commit changes
        run: |
          git add ${{ steps.var.outputs.API_BUNDLED_FILE }}
          git commit -m "Update bundled API file" || echo "No changes to commit"
          echo "$(git rev-parse HEAD)"

      - name: Get the new commit SHA
        id: new_sha
        run: echo "NEW_SHA=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      # Push the changes back to the head branch
      - name: Push changes
        run: |
          git push origin HEAD:${{ github.head_ref }}  # Push to the branch that triggered the workflow

  lint-api:
    uses: ./.github/workflows/lint-workflow.yaml
    with:
      apiName: ${{ needs.bundle-api.outputs.API }}
      commitSha: ${{ needs.bundle-api.outputs.NEW_SHA }}
    needs: bundle-api
