                              type: unit
                              value: 3
                            price:
                              type: actual
                              value: 10.8
                              currency: CHF
                            executionIds:
                              - exec-1
                              - exec-2
                              - exec-3
                            billingDetails:
                              grossTradeAmount:
                                value: 32.4
                                currency: CHF
                              grossSettlementAmount:
                                value: 32.4
                                currency: CHF
                              netSettlementAmount:
                                value: 35.4
                                currency: CHF
                              netBillingAmount:
                                value: 35.4
                                currency: CHF
                              stampDuty:
                                value: 1
                                currency: CHF
                              brokerageFee:
                                value: 1
                                currency: CHF
                              exchangeFee:
                                value: 1
                                currency: CHF
