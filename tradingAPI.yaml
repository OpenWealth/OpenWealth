      responses:
        '200':
          description: Execution list.
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
            X-nextCursor:
              $ref: '#/components/headers/X-Next-Cursor'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Execution'
              examples:
                ExecutionsOrder1:
                  value:
                    - id: exec-1
                      orderId: order-1
                      reference: exec-1
                      quantity: 2
                      executionDateTime: '2018-04-13T14:00:00Z'
                      price:
                        type: actual
                        value: 10
                        currency: CHF
                      placeOfTrade:
                        marketIdentificationCode: XSWX
                    - id: exec-2
                      orderId: order-1
                      reference: exec-2
