                      - id: allocation-2
                        orderId: order-1
                        debitAccount:
                          id: cash-acc-2
                          type: cashAccount
                          number: 1234-4321
                          iban: CH1234567894321
                        creditAccount:
                          id: safe-2
                          type: safekeepingAccount
                          number: 1234-42
                        requestedQuantity:
                          type: unit
                          value: 2
                        remainingQuantity:
                          type: unit
                          value: 0
                        averagePrice:
                          type: actual
                          value: 10.8
                          currency: CHF
                        executionAllocationList:
                          - allocatedQuantity:
                              type: unit
                              value: 2
                            price:
                              type: actual
                              value: 10.8
                              currency: CHF
                            executionIds:
                              - exec-1
                              - exec-2
                              - exec-3
                            billingDetails:
                              grossTradeAmount:
                                value: 21.6
                                currency: CHF
                              grossSettlementAmount:
                                value: 21.6
                                currency: CHF
                              netSettlementAmount:
                                value: 24.6
                                currency: CHF
                              netBillingAmount:
                                value: 24.6
                                currency: CHF
                              stampDuty:
                                value: 1
                                currency: CHF
                              brokerageFee:
                                value: 1
