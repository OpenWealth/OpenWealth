get:
  tags:
    - positions
  summary: Returns a position by id for a specific customer
  description: Returns a position by id for a specific customer.
  operationId: getCustomerPositionById
  parameters:
    - $ref: ../../generics/components/parameters/path_customerId.yaml
    - $ref: ../../generics/components/parameters/path_positionId.yaml
    - $ref: ../../generics/components/parameters/date.yaml
    - $ref: ../components/parameters/end_of_day_indicator.yaml
    - $ref: ../../generics/components/parameters/x_correlation_id_in_header.yaml
  responses:
    '200':
      description: Position.
      headers:
        X-Correlation-ID:
          $ref: ../../generics/components/headers/X-Correlation-Id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ValuatedPosition.yaml
          examples:
            CashAccountCHF:
              $ref: ../components/examples/positions/000-cash-account-chf.yaml
            BondCHF:
              $ref: ../components/examples/positions/001-bond.yaml
            Equity:
              $ref: ../components/examples/positions/002-equity.yaml
            EquityWithFx:
              $ref: ../components/examples/positions/002-equity-with-fx.yaml
            Fund:
              $ref: ../components/examples/positions/003-fund.yaml
            PutOptionWithFx:
              $ref: ../components/examples/positions/006-option-put-with-fx.yaml
            FxForward:
              $ref: ../components/examples/positions/008-fx-forward.yaml
            FxSwap:
              $ref: ../components/examples/positions/009-fx-swap.yaml
            CallableDeposit:
              $ref: ../components/examples/positions/011-callable-deposit.yaml
            FixedDeposit:
              $ref: ../components/examples/positions/012-fixed-deposit.yaml
            InterestRateSwap:
              $ref: ../components/examples/positions/013-interest-rate-swap.yaml
            TotalReturnSwap:
              $ref: ../components/examples/positions/014-total-return-swap.yaml
            Credit:
              $ref: ../components/examples/positions/015-credit.yaml
    '400':
      $ref: ../../generics/components/responses/400.yaml
    '401':
      $ref: ../../generics/components/responses/401.yaml
    '403':
      $ref: ../../generics/components/responses/403.yaml
    '404':
      $ref: ../../generics/components/responses/404.yaml
    '405':
      $ref: ../../generics/components/responses/405.yaml
    '500':
      $ref: ../../generics/components/responses/500.yaml
    '501':
      $ref: ../../generics/components/responses/501.yaml
    '503':
      $ref: ../../generics/components/responses/503.yaml
