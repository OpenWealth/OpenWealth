title: Credit
description: Credit.
allOf:
  - $ref: 'FinancialInstrumentBase.yaml'
  - type: object
    required:
      - principalAmount
    properties:
      principalAmount:
        description: The current amount subject to loan or borrowing on which interest is calculated.
        $ref: 'CurrencyAmount.yaml'
      interestRate:
        $ref: 'InterestRate.yaml'
      limitId:
        type: string
        description: |
          Unique and unambiguous identification of the associated credit limit.
