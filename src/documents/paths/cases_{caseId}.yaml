get:
  tags:
    - cases
  summary: Returns a case by id
  description: Returns a specific case by id.
  operationId: getCaseById
  parameters:
    - $ref: ../../generics/components/parameters/path_caseId.yaml
    - $ref: ../../generics/components/parameters/x_correlation_id_in_header.yaml
  responses:
    '200':
      description: Case.
      headers:
        X-Correlation-ID:
          $ref: ../../generics/components/headers/X-Correlation-Id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Case.yaml
    '400':
      $ref: ../../generics/components/responses/400.yaml
    '401':
      $ref: ../../generics/components/responses/401.yaml
    '403':
      $ref: ../../generics/components/responses/403.yaml
    '404':
      $ref: ../../generics/components/responses/404.yaml
    '405':
      $ref: ../../generics/components/responses/405.yaml
    '500':
      $ref: ../../generics/components/responses/500.yaml
    '501':
      $ref: ../../generics/components/responses/501.yaml
    '503':
      $ref: ../../generics/components/responses/503.yaml
put:
  tags:
    - cases
  summary: Updates a case by id
  description: Updates an existing case by id.
  operationId: updateCaseById
  parameters:
    - $ref: ../../generics/components/parameters/path_caseId.yaml
    - $ref: ../../generics/components/parameters/x_correlation_id_in_header.yaml
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/Case.yaml
  responses:
    '200':
      description: Case successfully updated.
      headers:
        X-Correlation-ID:
          $ref: ../../generics/components/headers/X-Correlation-Id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Case.yaml
    '400':
      $ref: ../../generics/components/responses/400.yaml
    '401':
      $ref: ../../generics/components/responses/401.yaml
    '403':
      $ref: ../../generics/components/responses/403.yaml
    '404':
      $ref: ../../generics/components/responses/404.yaml
    '405':
      $ref: ../../generics/components/responses/405.yaml
    '500':
      $ref: ../../generics/components/responses/500.yaml
    '501':
      $ref: ../../generics/components/responses/501.yaml
    '503':
      $ref: ../../generics/components/responses/503.yaml
delete:
  tags:
    - cases
  summary: Deletes a case by id
  description: Deletes a specific case by id.
  operationId: deleteCaseById
  parameters:
    - $ref: ../../generics/components/parameters/path_caseId.yaml
    - $ref: ../../generics/components/parameters/x_correlation_id_in_header.yaml
  responses:
    '204':
      description: Case successfully deleted (empty response).
      headers:
        X-Correlation-ID:
          $ref: ../../generics/components/headers/X-Correlation-Id.yaml
    '400':
      $ref: ../../generics/components/responses/400.yaml
    '401':
      $ref: ../../generics/components/responses/401.yaml
    '403':
      $ref: ../../generics/components/responses/403.yaml
    '404':
      $ref: ../../generics/components/responses/404.yaml
    '405':
      $ref: ../../generics/components/responses/405.yaml
    '500':
      $ref: ../../generics/components/responses/500.yaml
    '501':
      $ref: ../../generics/components/responses/501.yaml
    '503':
      $ref: ../../generics/components/responses/503.yaml
