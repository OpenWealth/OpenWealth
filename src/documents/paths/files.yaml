post:
  summary: Add a New File
  parameters:
    - $ref: ../components/parameters/authorization_in_header.yaml
    - $ref: ../components/parameters/correlation_in_header.yaml
  operationId: addFile
  tags:
    - File
  requestBody:
    content:
      application/json:
        schema:
          type: object
          properties:
            referencedDocumentId:
              type: string
              description: the id which points to the corresponding document
  responses:
    '200':
      description: New file has been added
      headers:
        X-Correlation-ID:
          $ref: ../components/headers/X-Correlation-ID.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              referencedDocumentId:
                type: string
                description: >-
                  the id which can be used to query the metadata under
                  /documents/{documentId}
              fileId:
                type: string
                description: >-
                  the id which can be used to upload file chunks under
                  /files/{fileId}
    '400':
      $ref: ../components/responses/standard400.yaml
    '401':
      $ref: ../components/responses/standard401.yaml
    '403':
      $ref: ../components/responses/standard403.yaml
    '404':
      $ref: ../components/responses/standard404.yaml
    '500':
      $ref: ../components/responses/standard500.yaml
    '503':
      $ref: ../components/responses/standard503.yaml
