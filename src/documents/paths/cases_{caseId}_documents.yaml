get:
  parameters:
    - $ref: ../../generics/components/parameters/path_caseId.yaml
    - $ref: ../../generics/components/parameters/cursor.yaml
    - $ref: ../../generics/components/parameters/limit.yaml
    - $ref: ../../generics/components/parameters/correlation_id.yaml
  summary: Get the List of Documents
  description: |
    Get a list of all documents related to a case.
  operationId: getDocuments
  tags:
    - Document
  responses:
    '200':
      description: Returns a list with all document metadata records.
      headers:
        Correlation-Id:
          $ref: ../../generics/components/headers/Correlation-Id.yaml
        Next-Cursor:
          $ref: ../../generics/components/headers/Next-Cursor.yaml
      content:
        application/json:
          schema:
            items:
              $ref: ../components/schemas/Document.yaml
    '400':
      $ref: ../../generics/components/responses/400.yaml
    '401':
      $ref: ../../generics/components/responses/401.yaml
    '403':
      $ref: ../../generics/components/responses/403.yaml
    '500':
      $ref: ../../generics/components/responses/500.yaml
    '503':
      $ref: ../../generics/components/responses/503.yaml
post:
  summary: Add a New Document
  description: Upload the metadata for a new file.
  parameters:
    - $ref: ../../generics/components/parameters/path_caseId.yaml
    - $ref: ../../generics/components/parameters/correlation_id.yaml
  operationId: addDocument
  tags:
    - Document
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/Document.yaml
        examples:
          PDFStatement:
            $ref: ../components/examples/PdfStatement.yaml
  responses:
    '201':
      description: Document was accepted
      headers:
        Correlation-Id:
          $ref: ../../generics/components/headers/Correlation-Id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Document.yaml
          examples:
            PDFStatement:
              $ref: ../components/examples/PdfStatement.yaml
    '400':
      $ref: ../../generics/components/responses/400.yaml
    '401':
      $ref: ../../generics/components/responses/401.yaml
    '403':
      $ref: ../../generics/components/responses/403.yaml
    '500':
      $ref: ../../generics/components/responses/500.yaml
    '503':
      $ref: ../../generics/components/responses/503.yaml
