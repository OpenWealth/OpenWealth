    $ref: ../headers/X-Correlation-ID.yaml
  WWW-Authenticate:
    $ref: ../headers/WWW-Authenticate.yaml
description: >-
  Unauthorized - Either no token or an invalid (e.g., token expired) token was
  received.
content:
