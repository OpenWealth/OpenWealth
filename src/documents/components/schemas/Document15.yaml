type: object
description: |
  The document object is loosly based on the ISO 20022 Document15 Specification 
  (see https://www.iso20022.org/standardsrepository/type/Document15)

  It is using the same attributes and lengths, minus Signature and Enclosure.
properties:
  type:
    description: Type of document or template.
    allOf:
      - $ref: ./DocumentType1Choice.yaml
  identification:
    description: Identification of the document or template.
    type: string
    minLength: 1
    maxLength: 35
  issueDate:
    description: Issue date or date time of the document.
    allOf:
      - $ref: ./DateAndDateTime2Choice.yaml
  name:
    description: Name of document or transaction, for example, tax invoice.
    type: string
    minLength: 1
    maxLength: 140
  languageCode:
    description: Unique identifier for a language used in the document.
    allOf:
      - $ref: ./Language.yaml
  format:
    description: Format of the document or template, such as PDF, XML, XSLT.
    allOf:
      - $ref: ./DocumentFormat1Choice.yaml
  fileName:
    description: Technical name of the file.
    type: string
    minLength: 1
    maxLength: 140
