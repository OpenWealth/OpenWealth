headers:
  X-Correlation-ID:
    $ref: ../headers/X-Correlation-ID.yaml
description: >
  When an SU sends too many lookup or polling requests in a given amount of time
  the SP shall 

  respond with HTTP 429 (Too many requests). This response may contain a
  Retry-After header 

  indicating how long the SU must wait before making a new request. (see
  https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/429).
content:
  application/problem+json:
    schema:
      $ref: CommonErrorResponse.yaml
    example:
      type: /problems/TOO_MANY_REQUESTS
      title: resource not found
      detail: ...
      instance: path/to/corresponding/resource
