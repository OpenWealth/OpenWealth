get:
  tags:
    - order
  summary: Returns a single order
  description: Returns a specific security order.
  operationId: getOrder
  parameters:
    - $ref: ../components/parameters/order_id.yaml
    - $ref: ../components/parameters/expand_order.yaml
    - $ref: ../../generics/components/parameters/correlation_id.yaml
  responses:
    '200':
      description: Receive a specific order with the corresponding allocations and status.
      headers:
        Correlation-Id:
          $ref: ../../generics/components/headers/Correlation-Id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Order.yaml
          examples:
            bondOrder:
              $ref: ../components/examples/orders/bond-order-executed.yaml
            equitySimpleOrder:
              $ref: ../components/examples/orders/equity-simple-order-executed.yaml
            equityOrder:
              $ref: ../components/examples/orders/equity-order-executed.yaml
            equityOrderPartiallyFilled:
              $ref: ../components/examples/orders/equity-order-partially-filled.yaml
            fxSpotOrder:
              $ref: ../components/examples/orders/fx-spot-order-executed.yaml
            fxSwapOrder:
              $ref: ../components/examples/orders/fx-swap-order-executed.yaml
            cryptoOrder:
              $ref: ../components/examples/orders/crypto-order-executed.yaml
    '400':
      $ref: ../../generics/components/responses/400.yaml
    '401':
      $ref: ../../generics/components/responses/401.yaml
    '403':
      $ref: ../../generics/components/responses/403.yaml
    '404':
      $ref: ../../generics/components/responses/404.yaml
    '405':
      $ref: ../../generics/components/responses/405.yaml
    '500':
      $ref: ../../generics/components/responses/500.yaml
    '501':
      $ref: ../../generics/components/responses/501.yaml
    '503':
      $ref: ../../generics/components/responses/503.yaml
