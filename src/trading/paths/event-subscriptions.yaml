post:
  tags:
    - event-subscription
  summary: Subscribe to Events
  description: Allows TPP to subscribe to specific events for the API.
  operationId: postEventSubscription
  parameters:
    - $ref: ../../generics/components/parameters/x_correlation_id_in_header.yaml
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/eventSubscriptionRequest.yaml
  responses:
    '201':
      description: Subscription created.
      headers:
        X-Correlation-ID:
          $ref: ../../generics/components/headers/X-Correlation-ID.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/eventSubscription.yaml
    '400':
      $ref: ../../generics/components/responses/400.yaml
    '401':
      $ref: ../../generics/components/responses/401.yaml
    '403':
      $ref: ../../generics/components/responses/403.yaml
    '404':
      $ref: ../../generics/components/responses/404.yaml
    '405':
      $ref: ../../generics/components/responses/405.yaml
    '409':
      $ref: ../../generics/components/responses/409.yaml
    '500':
      $ref: ../../generics/components/responses/500.yaml
    '501':
      $ref: ../../generics/components/responses/501.yaml
    '503':
      $ref: ../../generics/components/responses/503.yaml
    '504':
      $ref: ../../generics/components/responses/504.yaml
get:
  tags:
    - event-subscription
  summary: View Subscriptions
  description: Allows TPP to view the event subscriptions.
  operationId: getEventSubscriptions
  parameters:
    - $ref: ../../generics/components/parameters/x_correlation_id_in_header.yaml
  responses:
    '200':
      description: Event Subscription read.
      headers:
        X-Correlation-ID:
          $ref: ../../generics/components/headers/X-Correlation-ID.yaml
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/eventSubscription.yaml
    '400':
      $ref: ../../generics/components/responses/400.yaml
    '401':
      $ref: ../../generics/components/responses/401.yaml
    '403':
      $ref: ../../generics/components/responses/403.yaml
    '404':
      $ref: ../../generics/components/responses/404.yaml
    '405':
      $ref: ../../generics/components/responses/405.yaml
    '500':
      $ref: ../../generics/components/responses/500.yaml
    '501':
      $ref: ../../generics/components/responses/501.yaml
    '503':
      $ref: ../../generics/components/responses/503.yaml
    '504':
      $ref: ../../generics/components/responses/504.yaml
