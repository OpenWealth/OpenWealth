get:
  summary: Get event subscriptions
  description: Get list of event subscriptions.
  operationId: getEventSubscriptions
  parameters:
    - $ref: ../../generics/components/parameters/cursor.yaml
    - $ref: ../../generics/components/parameters/limit.yaml
    - $ref: ../../generics/components/parameters/x_correlation_id_in_header.yaml
  tags:
    - event-subscription
  responses:
    '200':
      description: List of EventSubscriptions
      headers:
        X-Correlation-ID:
          $ref: ../../generics/components/headers/X-Correlation-ID.yaml
        x-nextCursor:
          $ref: ../../generics/components/headers/X-Next-Cursor.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              eventNotifications:
                type: array
                items:
                  $ref: ../components/schemas/EventSubscription.yaml
    '400':
      $ref: ../../generics/components/responses/400.yaml
    '401':
      $ref: ../../generics/components/responses/401.yaml
    '403':
      $ref: ../../generics/components/responses/403.yaml
    '404':
      $ref: ../../generics/components/responses/404.yaml
    '500':
      $ref: ../../generics/components/responses/500.yaml
    '501':
      $ref: ../../generics/components/responses/501.yaml
    '503':
      $ref: ../../generics/components/responses/503.yaml
    '504':
      $ref: ../../generics/components/responses/504.yaml
post:
  summary: Create event subscription
  description: Create event subscription
  operationId: createEventSubscription
  parameters:
    - $ref: ../../generics/components/parameters/x_correlation_id_in_header.yaml
  tags:
    - Event Subscription
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/EventSubscription.yaml
  responses:
    '201':
      description: EventSubscription created
      headers:
        X-Correlation-ID:
          $ref: ../../generics/components/headers/X-Correlation-ID.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/EventSubscription.yaml
      links:
        GetSubscriptionById:
          description: >
            The `eventSubscriptionId` value returned in the response can be used
            as the `eventSubscriptionId` parameter in `GET
            /event-subscriptions/{eventSubscriptionId}`.
          operationId: getEventSubscription
          parameters:
            documentId: $response.body#/eventSubscriptionId
    '400':
      $ref: ../../generics/components/responses/400.yaml
    '401':
      $ref: ../../generics/components/responses/401.yaml
    '403':
      $ref: ../../generics/components/responses/403.yaml
    '404':
      $ref: ../../generics/components/responses/404.yaml
    '409':
      $ref: ../../generics/components/responses/409.yaml
    '500':
      $ref: ../../generics/components/responses/500.yaml
    '501':
      $ref: ../../generics/components/responses/501.yaml
    '503':
      $ref: ../../generics/components/responses/503.yaml
    '504':
      $ref: ../../generics/components/responses/504.yaml
