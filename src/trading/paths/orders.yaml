post:
  tags:
    - order
  summary: Posts a new order
  description: Posts a new order.
  operationId: createOrder
  parameters:
    - $ref: ../../generics/components/parameters/correlation_id.yaml
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/Order.yaml
  responses:
    '202':
      description: Order accepted for further processing.
      headers:
        Correlation-Id:
          $ref: ../../generics/components/headers/Correlation-Id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Order.yaml
    '400':
      $ref: ../../generics/components/responses/400.yaml
    '401':
      $ref: ../../generics/components/responses/401.yaml
    '403':
      $ref: ../../generics/components/responses/403.yaml
    '404':
      $ref: ../../generics/components/responses/404.yaml
    '405':
      $ref: ../../generics/components/responses/405.yaml
    '500':
      $ref: ../../generics/components/responses/500.yaml
    '501':
      $ref: ../../generics/components/responses/501.yaml
    '503':
      $ref: ../../generics/components/responses/503.yaml
get:
  tags:
    - order
  summary: Returns a list of open orders
  description: |
    Returns all open orders to which the user of the API has access to. Paging
    is done based on the order object,
    i.e. if limit is set to 1, then 1 order will be returned per page.
  operationId: listOrders
  parameters:
    - $ref: ../components/parameters/expand_order.yaml
    - $ref: ../../generics/components/parameters/cursor.yaml
    - $ref: ../../generics/components/parameters/limit.yaml
    - $ref: ../../generics/components/parameters/correlation_id.yaml
  responses:
    '200':
      description: Order list.
      headers:
        Correlation-Id:
          $ref: ../../generics/components/headers/Correlation-Id.yaml
        X-nextCursor:
          $ref: ../../generics/components/headers/Next-Cursor.yaml
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/Order.yaml
    '400':
      $ref: ../../generics/components/responses/400.yaml
    '401':
      $ref: ../../generics/components/responses/401.yaml
    '403':
      $ref: ../../generics/components/responses/403.yaml
    '404':
      $ref: ../../generics/components/responses/404.yaml
    '405':
      $ref: ../../generics/components/responses/405.yaml
    '500':
      $ref: ../../generics/components/responses/500.yaml
    '501':
      $ref: ../../generics/components/responses/501.yaml
    '503':
      $ref: ../../generics/components/responses/503.yaml
