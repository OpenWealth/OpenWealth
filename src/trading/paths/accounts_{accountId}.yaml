get:
  tags:
    - account
  summary: Returns a specific account by id
  description: Returns a specific account by id accessible for the requesting user.
  operationId: getAccount
  parameters:
    - $ref: ../../generics/components/parameters/account_id.yaml
    - $ref: ../../generics/components/parameters/correlation_id.yaml
  responses:
    '200':
      description: Returns a the specified account.
      headers:
        Correlation-Id:
          $ref: ../../generics/components/headers/Correlation-Id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Account.yaml
          examples:
            cashAccount1CHF:
              $ref: ../components/examples/accounts/cash-account-chf-1.yaml
            cashAccount1EUR:
              $ref: ../components/examples/accounts/cash-account-eur-1.yaml
            safekeepingAccount1:
              $ref: ../components/examples/accounts/safekeeping-account-1.yaml
            cashAccount2CHF:
              $ref: ../components/examples/accounts/cash-account-chf-2.yaml
            cashAccount2EUR:
              $ref: ../components/examples/accounts/cash-account-eur-2.yaml
            safekeepingAccount2:
              $ref: ../components/examples/accounts/safekeeping-account-2.yaml
    '400':
      $ref: ../../generics/components/responses/400.yaml
    '401':
      $ref: ../../generics/components/responses/401.yaml
    '403':
      $ref: ../../generics/components/responses/403.yaml
    '404':
      $ref: ../../generics/components/responses/404.yaml
    '405':
      $ref: ../../generics/components/responses/405.yaml
    '500':
      $ref: ../../generics/components/responses/500.yaml
    '501':
      $ref: ../../generics/components/responses/501.yaml
    '503':
      $ref: ../../generics/components/responses/503.yaml
