openapi: 3.0.0
info:
  version: 2.2.1
  title: OpenWealth Order Placement Event Notification API - TPP Endpoint
  description: API for Receiving Event Notification for OpenWealth APIs.
  contact:
    email: openwealth@synpulse.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - description: Your server url
    url: https://www.openwealth.ch

externalDocs:
  description: Find out more about OpenWealth API specifications.
  url: https://openwealth.ch

tags:
  - name: event-notification
    description: Order event notifications.

security: []

paths:
  /event-notifications:
    post:
      tags:
        - event-notification
      summary: Push notification towards TPP
      description: Push notficiations for subscribed event notifications.
      operationId: callbackEventNotification
      parameters:
        - $ref: ../generics/components/parameters/x_correlation_id_in_header.yaml
      requestBody:
        content:
          application/json:
            schema:
              $ref: './components/schemas/EventNotification.yaml'

      responses:
        '202':
          description: Notification accepted.
          headers:
            X-Correlation-ID:
              $ref: '../generics/V2/components/headers/X-Correlation-Id.yaml'

        '400':
          $ref: '../generics/V2/components/responses/400.yaml'
        '500':
          $ref: '../generics/V2/components/responses/500.yaml'
components:
  schemas: {}
  responses: {}
  parameters: {}
  headers: {}
  securitySchemes: {}
