type: object
description: Indicates the reason, why an order is invalid/cancelled/rejected.
required:
  - code
properties:
  code:
    type: string
    description: Cancelled reason expressed as a code.
    enum:
      - cancelledByInstructingParty
      - cancelledByOther
      - invalidListing
      - invalidProperty
      - invalidInstrument
      - invalidPropertyCombination
      - invalidOrderQuantity
      - invalidAccount
      - invalidAllocationQuantity
      - maximumNumberOfAllocationsExceeded
      - preTradeCheckFailed
      - other
    example: cancelledByInstructingParty
  details:
    type: string
    description: Cancelled reason expressed as a proprietary description that provides more details about the reason of the cancellation.
    example: Cancelled by client
  affectedProperties:
    type: array
    items:
      properties:
        code:
          type: string
          description: Reason of error related to property.
          enum:
            - invalidDate
            - dateInPast
            - invalidValue
            - valueTooHigh
            - valueTooSmall
            - required
            - itemsRequired
            - notAllowed
            - wrongDenomination
            - insufficientFunds
            - notFound
            - notSupported
            - other
        propertyPath:
          type: string
          description: Path to affected property according to TBD
