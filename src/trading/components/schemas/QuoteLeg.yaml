type: object
required:
  - side
  - quantity
  - baseInstrument
  - quoteInstrument
properties:
  side:
    $ref: OrderSide.yaml
  quantity:
    $ref: Quantity.yaml
  baseInstrument:
    description: Instrument subject to intended sale or purchase.
    $ref: FinancialInstrument.yaml
  quoteInstrument:
    description: |
      Instrument (i.e. currency) for which the quote is requested in exchange
      for the purchase resp. sell of the baseInstrument.
    $ref: FinancialInstrument.yaml
  price:
    $ref: Price.yaml
    readOnly: true
