title: Financial instrument swap agreement
description: Schema of a financial instrument swap agreement
allOf:
  - $ref: 'FinancialInstrumentBase.yaml'
  - type: object
    required:
      - unitType
      - nearSettlementDate
      - farSettlementDate
    properties:
      unitType:
        type: string
        enum:
          - g
          - kg
          - oz
      nearSettlementDate:
        $ref: ../../../generics/components/schemas/Date.yaml
      farSettlementDate:
        $ref: ../../../generics/components/schemas/Date.yaml
