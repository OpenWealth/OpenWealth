# required:
#   - extendedOrder
#   - orderState
# type: object
# properties:
#   statementDateTime:
#     $ref: 'statementDateTime.yaml'
#   extendedOrder:
#     $ref: 'extendedOrder.yaml'
#   orderState:
#     $ref: 'orderState.yaml'
#   dateList:
#     items:
#       $ref: 'orderDate.yaml'
required:
  - clientReference
  - side
  - orderQuantity
  - financialInstrument
  - currency
  - executionType
  - timeInForce
  - numberOfAllocations
type: object
description: Order object.
properties:
  id:
    type: string
    description: Unambiguous identifier for the bulk order, as assigned by the confirming party.
    example: e6751a48-0819-4482-98a4-760453ba770d
    readOnly: true
  clientReference:
    type: string
    example: 123-123123
    description: Reference of the order, as assigned by the instructing party.
    maxLength: 20
  orderDateTime:
    type: string
    format: date-time
    example: 2018-04-13T11:11:11Z
    description: Date and time the order has been received. In accordance with ISO 8601.
    readOnly: true
  status:
    $ref: 'OrderStatus.yaml'
    readOnly: true
  side:
    type: string
    description: Side taken by a party on an order.
    example: buy
    enum:
      - buy
      - sell
  orderQuantity:
    description: Ordered quantity.
    $ref: 'Quantity.yaml'
  displayQuantity:
    $ref: 'Quantity.yaml'
  numberOfAllocations:
    type: number
    format: integer
    example: 5
    description: Indicates number of orders to be combined for average pricing and allocation.
  financialInstrument:
    $ref: 'FinancialInstrument.yaml'
  requestedPlaceOfTrade:
    $ref: 'PlaceOfTrade.yaml'
  currency:
    $ref: '../../../generics/components/schemas/Currency.yaml'
  executionType:
    type: string
    description: Type of the execution of the order.
    example: limit
    enum:
      - market
      - limit
      - stop
      - stopLimit
  limitPrice:
    description: Limit price per unit of quantity (e.g. per share)
    $ref: 'Price.yaml'
  stopPrice:
    description: Stop price per unit of quantity (e.g. per share)
    $ref: 'Price.yaml'
  timeInForce:
    type: string
    description: Specifies how long the order remains in effect.
    example: day
    enum:
      - day
      - goodTillCancel
      - atTheOpening
      - immediateOrCancel
      - fillOrKill
      - goodTillCrossing
      - goodTillDate
      - atTheClose
      - goodThroughCrossing
      - atCrossing
      - goodForTime
      - goodForAuction
      - goodForMonth
  expiryDateTime:
    $ref: '../../../generics/components/schemas/DateTime.yaml'
  allocationList:
    type: array
    items:
      $ref: 'Allocation.yaml'
  orderCancellationReasonList:
    type: array
    items:
      $ref: 'OrderCancellationReason.yaml'
    readOnly: true
  executedQuantity:
    $ref: 'Quantity.yaml'
    readOnly: true
