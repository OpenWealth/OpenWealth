type: object
description: Order object.
required:
  - clientReference
  - side
  - quantity
  - baseInstrument
  - quoteInstrument
  - executionType
  - timeInForce
properties:
  id:
    type: string
    maxLength: 128
    description: |
      Unambiguous identifier for the bulk order,
      as assigned by the confirming party (i.e. Custodian).
    example: e6751a48-0819-4482-98a4-760453ba770d
    readOnly: true
  clientReference:
    type: string
    maxLength: 128
    example: 123-123123
    description: |
      Reference of the order (unique identification),
      as assigned by the instructing party (i.e. TPP).
  groupReference:
    type: string
    maxLength: 128
    description: Optional reference to link orders, i.e. multi-leg orders.
  orderDateTime:
    type: string
    format: date-time
    example: 2018-04-13T11:11:11Z
    description: Date and time the order has been received. In accordance with ISO 8601.
    readOnly: true
  status:
    $ref: 'OrderStatus.yaml'
    readOnly: true
  quantity:
    description: The total quantity of the order. The unit of this field is defined by the quantity schema.
    $ref: 'Quantity.yaml'
  side:
    $ref: 'OrderSide.yaml'
  unitReference:
    $ref: 'UnitReference.yaml'
  positionEffect:
    $ref: 'PositionEffect.yaml'
  bestEffortExecution:
    description: TBD
    type: boolean
    default: false
  baseInstrument:
    $ref: 'FinancialInstrument.yaml'
  quoteInstrument:
    $ref: 'FinancialInstrument.yaml'
  requestedPlaceOfTrade:
    $ref: 'PlaceOfTrade.yaml'
  executionType:
    type: string
    description: Type of the execution of the order.
    example: limit
    enum:
      - market
      - limit
      - stop
      - stopLimit
  limitPrice:
    description: Limit price per unit of quantity (e.g. per share)
    $ref: 'Price.yaml'
  stopPrice:
    description: |
      Price per unit of quantity (e.g. per share).
      Required for executionType 'stop' or 'stopLimit'.
    $ref: 'Price.yaml'
  timeInForce:
    type: string
    description: Specifies how long the order remains in effect.
    example: day
    enum:
      - day
      - goodTillCancel
      - atTheOpening
      - immediateOrCancel
      - fillOrKill
      - goodTillCrossing
      - goodTillDate
      - atTheClose
      - goodThroughCrossing
      - atCrossing
      - goodForTime
      - goodForAuction
      - goodForMonth
  expiryDateTime:
    $ref: '../../../generics/components/schemas/DateTime.yaml'
  exposureDuration:
    description: |
      This is the time in seconds of a 'goodForTime' TimeInForce.
      Positive integer value which represents the time is seconds in which the new order
      remains active in the market before it is automatically cancelled (e.g. expired).
    type: integer
    example: 86400
  quoteId:
    type: string
    maxLength: 128
    description: Unambiguous identifier for the quote that was provided by the confirming party.
    example: 6dca5123-e370-4272-8ef4-68d421f52f6e
  allocationList:
    type: array
    items:
      $ref: 'Allocation.yaml'
  orderCancellationReasonList:
    type: array
    items:
      $ref: 'OrderCancellationReason.yaml'
    readOnly: true
  executedQuantity:
    $ref: 'Quantity.yaml'
    readOnly: true
  cancelledQuantity:
    $ref: 'Quantity.yaml'
    readOnly: true
  orderPlacer:
    type: string
    maxLength: 128
    description: TBD
  decisionMaker:
    type: string
    maxLength: 128
    description: TBD
  additionalDetails:
    type: string
    maxLength: 512
    description: Provides additional details on the order which can not be included within the structured fields of the message.
    example: at pre Market and today
