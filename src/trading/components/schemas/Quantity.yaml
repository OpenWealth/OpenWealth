type: object
description: Ordered quantity.
properties:
  amount:
    type: string
    pattern: '^[0-9]{1,12}([.][0-9]{1,9})?$'
    maxLength: 22
    example: '12000'
    description: Absolute amount.
  type:
    type: string
    description: Type of the amount.
    example: unitsNumber
    enum:
      - unitsNumber
      - nominal
