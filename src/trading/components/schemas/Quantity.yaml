title: Quantity
type: object
description: Quantity entity.
required:
  - type
  - value
properties:
  type:
    type: string
    description: Specifies the type of the amount.
    example: unit
    enum:
      - unit
      - faceAmount
      - amortisedValue
      - digitalTokenUnit
  value:
    type: number
    example: 12000
    description: Absolut decimal number.
