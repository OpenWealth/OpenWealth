type: object
required:
  - identifier
  - type
properties:
  identifier:
    type: string
    example: CH0012005267
    description: Instrument identification.
  type:
    type: string
    example: isin
    description: Type of the instrument identification.
    enum:
      - isin
      - sedol
      - cusip
      - ric
      - tickerSymbol
      - bloomberg
      - cta
      - quick
      - wertpapier
      - dutch
      - valoren
      - sicovam
      - belgian
      - common
      - cryptoCurrency
      - iso4217
      - otherProprietaryIdentification
