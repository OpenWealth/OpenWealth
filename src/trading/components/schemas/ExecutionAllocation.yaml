type: object
description: Execution allocation
properties:
  executionReference:
    type: string
    description: Reference and|or identification of execution.
  executedQuantity:
    description: Total quantity (e.g. number of shares) executed.
    $ref: 'Quantity.yaml'
  executionDateTime:
    description: DateTime of the single execution.
    $ref: ../../../generics/components/schemas/DateTime.yaml
  price:
    description: The price for quantity that has traded.
    $ref: 'Price.yaml'
  placeOfTrade:
    $ref: 'PlaceOfTrade.yaml'
  transactionId:
    description: Indicates the transaction identification for an allocated execution.
    $ref: '../../../generics/components/schemas/Date.yaml'
  bookingDate:
    description: Indicates the booking date for an order or allocation.
    $ref: '../../../generics/components/schemas/Date.yaml'
  billingDetails:
    $ref: 'billingDetails.yaml'
