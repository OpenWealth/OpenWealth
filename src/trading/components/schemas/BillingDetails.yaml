type: object
description: Schema of the billing details object associated to each allocation of an order.
properties:
  grossTradeAmount:
    description: Principal amount of a trade (price multiplied by quantity).
    $ref: Amount.yaml
  settlementAmount:
    description: |
      Total amount of money to be paid or received in exchange for the securities.
      The amount includes the principal with any commissions and fees or accrued interest.
    $ref: Amount.yaml
  accruedInterest:
    $ref: 'Amount.yaml'
  stampDuty:
    $ref: Amount.yaml
  withholdingTax:
    $ref: Amount.yaml
  capitalGainTax:
    $ref: Amount.yaml
  financialTransactionTax:
    $ref: Amount.yaml
  transactionFee:
    $ref: Amount.yaml
  brokerageFee:
    $ref: Amount.yaml
  managementFee:
    $ref: Amount.yaml
  courtage:
    $ref: Amount.yaml
  custodyFee:
    $ref: Amount.yaml
  exchangeFee:
    $ref: Amount.yaml
  thirdPartyFee:
    $ref: Amount.yaml
  others:
    type: array
    items:
      type: object
      properties:
        description:
          type: string
          description: Description of the additional amount.
          example: Foreign stamp duty
        amount:
          $ref: Amount.yaml
