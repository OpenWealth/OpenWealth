type: object
description: Contract request object.
required:
  - type
properties:
  id:
    type: string
    description: Unambiguous identifier for the contract, as assigned by the confirming party.
    example: e6751a48-0819-4482-98a4-760453ba770d
    readOnly: true
  type:
    type: string
    description: Type of contract requested.
    example: buy
    enum:
      - forwardCurrency
      - currencySwap
  expiryDateTime:
    $ref: '../../../generics/components/schemas/DateTime.yaml'
    readOnly: true
  financialInstrument:
    $ref: 'FinancialInstrument.yaml'
    readOnly: true
