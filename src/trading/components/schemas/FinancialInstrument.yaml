type: object
required:
  - identification
properties:
  identification:
    type: object
    required:
      - identifier
      - type
    properties:
      identifier:
        type: string
        maxLength: 128
        example: CH0012005267
        description: Instrument identification.
      type:
        type: string
        example: isin
        description: Type of the instrument identification.
        enum:
          - isin
          - sedol
          - cusip
          - ric
          - tickerSymbol
          - bloomberg
          - cta
          - quick
          - wertpapier
          - dutch
          - valoren
          - sicovam
          - belgian
          - common
          - cryptocurrency
          - iso4217
          - otherProprietaryIdentification
