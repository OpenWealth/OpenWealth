title: Dark only Algo Trade
description: Schema of a Dark Only Algo Trade
allOf:
  - $ref: AlgoTradeBase.yaml
  - type: object
    required:
      - targetRate
    properties:
      urgency:
        description: |
          Indicates the degree of urgency for execution as defined by the client.
        type: string
        enum:
          - ultraPassive
          - passive
          - neutral
          - aggressive
          - superAggressive
      minQty:
        description: |
          Sets the minimum fill size in dark venues client may want.
        type: number
      primaryOnly:
        description: TBD.
        type: boolean
