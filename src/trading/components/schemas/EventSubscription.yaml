type: object
required:
  - eventTypes
properties:
  id:
    type: string
    readOnly: true
    maxLength: 36
    example: 7c5f40fc-1b29-4263-a2dd-e127a22a947f
  eventTypes:
    type: array
    items:
      type: string
      enum:
        - Order:Created
        - Order:Partially_Filled
    example:
      - Order:Created
      - Order:Partially_Filled
  callbackUrl:
    type: string
    example: https://ttp.com/API/notifications/order-placement/
    description: Not to be used in bLink
