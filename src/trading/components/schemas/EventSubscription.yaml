type: object
required:
  - eventTypes
properties:
  id:
    type: string
    readOnly: true
    maxLength: 36
    example: 7c5f40fc-1b29-4263-a2dd-e127a22a947f
  eventTypes:
    type: array
    items:
      type: string
      example:
        - order:created
        - order:statusUpdated
  callbackUrl:
    type: string
    example: https://ttp.com/API/notifications/order-placement/
    description: Not to be used in bLink
