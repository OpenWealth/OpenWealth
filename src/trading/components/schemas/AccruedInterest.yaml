type: object
description: Schema of an accrued interest object.
properties:
  numberDaysAccrued:
    type: integer
    example: 28
    description: Specifies the number of days used for calculating the accrued interest amount.
  amount:
    type: number
    description: |
      The monetary amount of interest that has been earned or accumulated on an account, investment,
      or financial instrument up to a specific point in time, but has not yet been paid or received.
    example: 105.30
  currency:
    $ref: ../../../generics/components/schemas/Currency.yaml
  foreignExchangeRate:
    $ref: ForeignExchangeRate.yaml
