type: object
required:
  - sourceType
  - amount
properties:
  sourceType:
    type: string
    enum:
      - incomeFromEmployment
      - incomeFromBusinessOwnership
      - saleOfCompany
      - saleOfNonFinancialAssets
      - lifeInsurance
      - pensionAssets
      - inheritance
      - gift
      - loan
      - saleOfFinancialAssets
      - capitalGains
      - otherSource
    description: Original source of assets
    example: saleOfCompany
  amount:
    $ref: 'Amount.yaml'
  originCountry:
    $ref: 'Country.yaml'
