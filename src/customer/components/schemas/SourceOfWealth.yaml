type: object
required:
  - sourceType
  - amount
properties:
  sourceType:
    type: string
    enum:
      - incomeFromEmployment
      - incomeFromBusinessOwnership
      - saleOfCompany
      - saleOfNonFinancialAssets
      - lifeInsurance
      - pensionAssets
      - inheritance
      - gift
      - loan
      - saleOfFinancialAssets
      - capitalGains
      - otherSource
    description: Original source of assets
    example: saleOfCompany
  amount:
    $ref: 'Amount.yaml'
  countryOfOrigin:
    type: string
    pattern: '^[A-Z]{2}$'
    description: Country of origin of the source of wealth, in ISO 3166-1 alpha-2 format.
    example: US
  additionalInformation:
    description: 'Description of the most important milestones/economic activities; which form the basis for the assets of the customer'
    type: string
    maxLength: 2500
    example: This is additional information.
