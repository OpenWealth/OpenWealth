type: object
description: Indicates the reason, why a case has the present status.
readOnly: true
required:
  - type
  - description
properties:
  type:
    type: string
    description:
      Type of the reason related to the object. The value is taken from a
      fixed list of reason types.
    enum:
      - missingValue
      - invalidValue
      - notAllowedValue
      - missingDocument
      - other
    example: error
  description:
    type: string
    description: Reason of error related to object.
    example: Country of domicile missing on person object.
  objectPath:
    type: string
    description: JsonPointer (RFC 6901) to affected property.
    example: /businessContext/customer/customerToPersonRelationList/0/person/countryOfDomicile
