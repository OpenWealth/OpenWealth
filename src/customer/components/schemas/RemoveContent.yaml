type: object
description: |
  Type-specific content of the case. The structure of this object defines the
  data required for removing a resource.
properties:
  resourceType:
    type: string
    enum:
      - customer
      - person
      - mandate
      - document
    description: The type of resource that is being modified as a result of
      processing the case.
    example: customer
  resourceId:
    type: string
    description: |
      The unique identifier of the resource that is being removed as a result of processing the case.
  resourceUri:
    type: string
    description: |
      The URI of the resource that is being created or modified as a result of processing the case.
      This field is populated by the bank as the case progresses and the resource is created.
