type: object
required:
  - type
  - amount
properties:
  type:
    type: string
    enum:
      - inflow
      - outflow
    description: Type of account movement
    example: inflow
  amount:
    $ref: 'Amount.yaml'
  dateReceivedOrSent:
    $ref: '../../../generics/components/schemas/Date.yaml'
  counterparty:
    type: string
    maxLength: 70
    description: Name of the sender/receiver of the assets
    example: Muster AG
  purpose:
    type: string
    maxLength: 128
    description: Purpose for the transfer
    example: Monthly salary payment
  frequency:
    type: string
    description: Frequency of payment/transfer
    example: monthly
    enum:
      - oneTime
      - daily
      - weekly
      - biweekly
      - semimonthly
      - monthly
      - quarterly
      - semiannually
      - annually
      - other
  countryOfOrigin:
    type: string
    pattern: '^[A-Z]{2}$'
    description: Country of origin of the fund flow, in ISO 3166-1 alpha-2 format.
    example: US
  accountOfOrigin:
    type: string
    maxLength: 34
    description: Account number of the sender/receiver of the assets, in IBAN format
      where applicable.
    example: DE89370400440532013000
  nameOfBank:
    type: string
    maxLength: 128
    # Name of the bank of the counterparty
  domicileOfBank:
    $ref: 'Country.yaml'
    # Domicile of the bank of the counterparty
  additionalInformation:
    description: Free text field to provide additional information.
    type: string
    maxLength: 2500
    example: This is additional information.
