type: object
description: Provides information about the employment status and the employment itself (e.g. company)
required:
  - employmentStatus
properties:
  employmentStatus:
    type: string
    enum:
      - employed
      - selfEmployed
      - retired
      - student
      - unemployed
      - firmOwner
      - privateEquityInvestor
      - professionalInvestor
      - other
    description: Status of employment
    example: retired
  profession:
    type: string
    maxLength: 35
    description: Profession
    example: Economist
  yearOfRetirement:
    type: string
    pattern: '[0-9]{4}'
    description: Year
    example: '1995'
  employmentItemList:
    type: array
    items:
      $ref: 'EmploymentItem.yaml'
