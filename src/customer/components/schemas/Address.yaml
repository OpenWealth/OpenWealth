type: object
required:
  - streetLine1
  - postalCode
  - city
  - country
properties:
  streetLine1:
    type: string
    description: Primary street address and house number
    example: 'Bahnhofstrasse 12'
  streetLine2:
    type: string
    description: Apartment, suite, unit, building, c/o
    example: 'Apt 4B'
  postalCode:
    type: string
    description: ZIP or postal code
    example: '8001'
  city:
    type: string
    example: 'Zürich'
  stateProvince:
    type: string
    description: State, canton, or province
    example: 'ZH'
  country:
    type: string
    description: ISO 3166-1 alpha-2 country code preferred
    example: 'CH'
  countryName:
    type: string
    description: Optional full country name
    example: 'Switzerland'
