type: object
required:
  - name
properties:
  id:
    type: string
    maxLength: 128
    description: Unique and unambiguous identification (i.e. UUID) used by the bank
      for the customer.
    example: 3f1c6a3e-9b7e-4f8b-a7c9-1d2e4a8c6b5f
    readOnly: true
  number:
    type: string
    description: Contains the customers custody proprietary customer number if available.
    maxLength: 70
    example: 12345-6
  name:
    type: string
    maxLength: 140
  type:
    type: string
    enum:
      - individual
      - groupOfIndividuals
      - legalEntity
      - foundation
      - insuranceCompany
      - institutionalInvestor
      - bank
      - other
    description: Type of customer relationship
    example: individual
  status:
    ## readonly?
    type: string
    enum:
      - active
      - inactive
    description: Status of the customer relationship
    example: active
  referenceCurrency:
    $ref: '../../../generics/components/schemas/Currency.yaml'
  openingDate:
    ## readonly?
    $ref: '../../../generics/components/schemas/Date.yaml'
  mainAdress:
    type: object
    description: Main address of the customer for correspondence purposes.
    $ref: Address.yaml
  salutation:
    $ref: Salutation.yaml
  salutationOverride:
    type: string
    maxLength: 128
    description: |
      Field to indicate the salutation override.
      Should only be used when salutation enum value is 'other' and 
      the salutation value is not sufficient to address the customer.
    example: Your Highness
  language:
    type: string
    description: Preferred language of the customer for correspondence purposes,
      represented as ISO 639-1 alpha-2 code.
    example: de
  personToCustomerRelationList:
    items:
      $ref: PersonToCustomerRelation.yaml
  bankAdvisor:
    description: Indicates the instruction/full name of the bank advisor on the side
      of the custody bank.
    $ref: Contact.yaml
