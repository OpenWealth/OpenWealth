get:
  tags:
    - correspondence
  summary: Returns the correspondence for a specific mandate
  description: |
    Returns all correspondence associated with a specific mandate accessible to the querying user.
    Paging is done based on the return object, i.e. if limit is set to 1,
    then 1 correspondence entry will be returned per page.
  operationId: getCorrespondenceByMandateId
  parameters:
    - $ref: ../../generics/components/parameters/path_customerId.yaml
    - $ref: ../../generics/components/parameters/path_mandateId.yaml
    - $ref: ../../generics/components/parameters/cursor.yaml
    - $ref: ../../generics/components/parameters/limit.yaml
    - $ref: ../../generics/components/parameters/x_correlation_id_in_header.yaml
  responses:
    '200':
      description: Correspondence List.
      headers:
        X-Correlation-ID:
          $ref: ../../generics/components/headers/X-Correlation-Id.yaml
        nextCursor:
          $ref: ../../generics/components/headers/X-Next-Cursor.yaml
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/Correspondence.yaml
    '400':
      $ref: ../../generics/components/responses/400.yaml
    '401':
      $ref: ../../generics/components/responses/401.yaml
    '403':
      $ref: ../../generics/components/responses/403.yaml
    '404':
      $ref: ../../generics/components/responses/404.yaml
    '405':
      $ref: ../../generics/components/responses/405.yaml
    '500':
      $ref: ../../generics/components/responses/500.yaml
    '501':
      $ref: ../../generics/components/responses/501.yaml
    '503':
      $ref: ../../generics/components/responses/503.yaml
post:
  tags:
    - correspondence
  summary: Creates a new correspondence entry for a specific mandate
  description: Creates a new correspondence entry associated with a specific mandate.
  operationId: createCorrespondenceByMandateId
  parameters:
    - $ref: ../../generics/components/parameters/path_customerId.yaml
    - $ref: ../../generics/components/parameters/path_mandateId.yaml
    - $ref: ../../generics/components/parameters/x_correlation_id_in_header.yaml
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/Correspondence.yaml
  responses:
    '201':
      description: Correspondence successfully created.
      headers:
        X-Correlation-ID:
          $ref: ../../generics/components/headers/X-Correlation-Id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Correspondence.yaml
    '400':
      $ref: ../../generics/components/responses/400.yaml
    '401':
      $ref: ../../generics/components/responses/401.yaml
    '403':
      $ref: ../../generics/components/responses/403.yaml
    '404':
      $ref: ../../generics/components/responses/404.yaml
    '405':
      $ref: ../../generics/components/responses/405.yaml
    '500':
      $ref: ../../generics/components/responses/500.yaml
    '501':
      $ref: ../../generics/components/responses/501.yaml
    '503':
      $ref: ../../generics/components/responses/503.yaml
