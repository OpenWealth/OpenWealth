get:
  tags:
    - persons
  summary: Returns all persons accessible for the logged in user
  description: |
    This endpoint returns a highlevel list of persons accessible for the
    logged in user. Paging is done based on the person object,
    i.e. if limit is set to 1, then 1 person will be returned per page.
  operationId: getPersons
  parameters:
    - $ref: ../../generics/components/parameters/cursor.yaml
    - $ref: ../../generics/components/parameters/limit.yaml
    - $ref: ../../generics/components/parameters/x_correlation_id_in_header.yaml
  responses:
    '200':
      description: Returns a list with all persons.
      headers:
        X-Correlation-ID:
          $ref: ../../generics/components/headers/X-Correlation-Id.yaml
        nextCursor:
          $ref: ../../generics/components/headers/X-Next-Cursor.yaml
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/Person.yaml
    '400':
      $ref: ../../generics/components/responses/400.yaml
    '401':
      $ref: ../../generics/components/responses/401.yaml
    '403':
      $ref: ../../generics/components/responses/403.yaml
    '404':
      $ref: ../../generics/components/responses/404.yaml
    '405':
      $ref: ../../generics/components/responses/405.yaml
    '500':
      $ref: ../../generics/components/responses/500.yaml
    '501':
      $ref: ../../generics/components/responses/501.yaml
    '503':
      $ref: ../../generics/components/responses/503.yaml
