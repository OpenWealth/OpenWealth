required:
  - clientOrderIdentification
  - bulkOrderDetails
  - requestedAllocationList
type: object
properties:
  clientOrderIdentification:
    type: string
    example: 123-123123
    description: Unambiguous identifier for the bulk order, as assigned by the instructing party.
    maxLength: 20
  orderDateTime:
    type: string
    format: date-time
    example: 2018-04-13T11:11:11Z
    description: Date and time of the order placement (UTC Timestamp). In accordance with ISO 8601.
    readOnly: true
  orderIdentification:
    type: string
    description: Unambiguous identifier for the bulk order, as assigned by the confirming party.
    example: 321-321321
    readOnly: true
  quoteIdentification:
    type: string
    example: 6dca5123-e370-4272-8ef4-68d421f52f6e
    description: Unique identifier of quote that corresponds to given order. Use together with executionTYpe "previouslyQuoted"
    maxLength: 36
  bulkOrderDetails:
    $ref: 'bulkOrderDetails.yaml'
  requestedAllocationList:
    type: array
    items:
      $ref: '../Types/requestedAllocation.yaml'
