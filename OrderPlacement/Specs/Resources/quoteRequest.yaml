type: object
required:
  - contractType
  - listing
  - quoteType
  - requestedAllocationList
  - side
  - unitReference
properties:
  listing:
    description: Listing of the product being quoted
    $ref: '../Types/listing.yaml'
  contractType:
    $ref: '../Types/contractType.yaml'
  orderQuantity:
    description: Total quantity of the order to be quoted, for forward and spot orders
    $ref: '../Types/orderQuantity.yaml'
  quoteType:
    $ref: '../Types/quoteType.yaml'
  settlementDate:
    description: Settlement date, for spot and forward contracts.
    $ref: '../../../Globals/V2/Types/dateTime.yaml'
  side:
    $ref: '../Types/orderSide.yaml'
  swapFarQuantity:
    description: Total quantity of far leg of swap, for FX currency swap
    $ref: '../Types/orderQuantity.yaml'
  swapFarSettlementDate:
    description: Settlement date for far leg of swap, FX swap
    $ref: '../../../Globals/V2/Types/dateTime.yaml'
  swapNearQuantity:
    description: Total quantity for near leg of swap, for FX currency swap
    $ref: '../Types/orderQuantity.yaml'
  swapNearSettlementDate:
    description: Settlement date for near leg of swap, for FX swap
    $ref: '../../../Globals/V2/Types/dateTime.yaml'
  requestedAllocationsList:
    type: array
    items:
      $ref: '../Types/requestedAllocation.yaml'
  unitReference:
    $ref: '../Types/unitReference.yaml'