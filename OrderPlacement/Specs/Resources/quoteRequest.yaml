type: object
required:
  - quoteRequestIdentification
  - listing
  - contractType
  - unitReference
  - side
  - orderQuantity
  - requestedAllocationList
properties:
  listing:
    baseInstrument:
      description: Base instrument of the listing, EUR in case of EUR/USD, ETH in case of ETH/USD, ETH/BTC
      $ref: '../Types/financialInstrumentDetails.yaml'
    quoteInstrument:
      description: Quote instrument of the listing, USD in case of EUR/USD, USD or BTC in case of ETH/USD, ETH/BTC
      $ref: '../Types/financialInstrumentDetails.yaml'
  contractType:
    type: string
    description: Type of contract
    example: forward
    enum:
      - forward
      - swap
      - spot
  orderQuantity:
    description: total quantity of the order to be quoted, for forward and spot orders
    $ref: '../Types/orderQuantity.yaml'
  forwardMaturityDate:
    description: maturity date, for forward
    $ref: '../../../Globals/V2/Types/dateTime.yaml'
  swapNearQuantity:
    description: total quantity for near leg of swap, for FX currency swap
    $ref: '../Types/orderQuantity.yaml'
  swapFarQuantity:
    description: total quantity of far leg of swap, for FX currency swap
    $ref: '../Types/orderQuantity.yaml'
  swapNearValueDate:
    description: value date for near leg of swap, for FX swap
    $ref: '../../../Globals/V2/Types/dateTime.yaml'
  swapFarValueDate:
    description: value date for far leg of swap, FX swap
    $ref: '../../../Globals/V2/Types/dateTime.yaml'
  side:
    type: string
    description: Side taken by a party on an order.
    example: buy
    enum:
      - buy
      - sell
  requestedAllocationsList:
    type: array
    items:
      $ref: '../Types/requestedAllocation.yaml'

