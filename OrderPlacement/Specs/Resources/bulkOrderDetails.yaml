required:
  - side
  - orderQuantity
  - executionType
  - timeInForce
  - numberOfAllocations
type: object
properties:
  side:
    $ref: '../Types/orderSide.yaml'
  orderQuantity:
    $ref: '../Types/orderQuantity.yaml'
  displayQuantity:
    $ref: '../Types/amount.yaml'
  numberOfAllocations:
    type: number
    format: integer
    example: 5
    description: Indicates number of orders to be combined for average pricing and allocation.
  financialInstrumentDetails:
    $ref: '../Types/financialInstrumentDetails.yaml'
  placeOfTrade:
    $ref: '../Types/placeOfTrade.yaml'
  currency:
    $ref: '../../../Globals/V2/Types/currency.yaml'
  executionType:
    type: string
    description: Type of the execution of the order.
    example: limit
    enum:
      - market
      - limit
      - stop
      - stopLimit
      - previouslyQuoted
  limitPrice:
    description: Limit price per unit of quantity (e.g. per share)
    $ref: '../Types/limitPrice.yaml'
  stopPrice:
    description: Stop price per unit of quantity (e.g. per share)
    $ref: '../Types/stopPrice.yaml'
  timeInForce:
    type: string
    description: Specifies how long the order remains in effect.
    example: day
    enum:
      - day
      - goodTillCancel
      - atTheOpening
      - immediateOrCancel
      - fillOrKill
      - goodTillCrossing
      - goodTillDate
      - atTheClose
      - goodThroughCrossing
      - atCrossing
      - goodForTime
      - goodForAuction
      - goodForMonth
  expiryDateTime:
    $ref: '../../../Globals/V2/Types/dateTime.yaml'
  additionalDetails:
    type: string
    maxLength: 128
    description: Provides additional details on the order which can not be included within the structured fields of the message.
    example: at pre Market and today
  unitReference:
    $ref: '../Types/unitReference.yaml'
