type: object
required:
  - eventSubscriptionId
properties:
  eventSubscriptionId:
    $ref: '../Types/eventSubscriptionId.yaml'
  callbackUrl:
    description: >-
      Callback URL for a TPP hosted service. Will be used by API exposing party, in
      conjunction with the resource name, to construct a URL to send
      event notifications to.
    type: string
    format: uri
    example: 'https://examplecallbackuri.com'
  eventTypes:
    description: Array of event types the subscription applies to. An empty list indicates that no notifications are sent.
    type: array
    items:
      $ref: '../Types/eventType.yaml'

