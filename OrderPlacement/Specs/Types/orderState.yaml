required:
  - status
  - executedQuantity
  - remainingQuantity
type: object
properties:
  status:
    $ref: 'orderStatus.yaml'
  statusDateTime:
    $ref: 'statusDateTime.yaml'
  orderCancellationReasonList:
    items:
      $ref: 'orderCancellationReason.yaml'
  executedQuantity:
    $ref: 'executedQuantity.yaml'
  remainingQuantity:
    $ref: 'remainingQuantity.yaml'
  averagePrice:
    type: string
    pattern: '[0-9]{1,12}([.][0-9]{1,9})?'
    maxLength: 22
    description: Calculated average price of all fills on this order.
    example: 17.85
  dayOrderQuantity:
    $ref: 'dayOrderQuantity.yaml'
  dayExecutedQuantity:
    $ref: 'dayExecutedQuantity.yaml'
  dayAveragePrice:
    $ref: 'dayAveragePrice.yaml'
  factor:
    type: string
    pattern: '[0-9]{1,12}([.][0-9]{1,9})?'
    maxLength: 22
    example: 100
    description: |
      For Fixed Income: Amorization Factor for deriving Current face from Original face for ABS or MBS securities, note the fraction may be greater than, equal to or less than . In TIPS securities this is the Inflation index.
      Qty * Factor * Price = Gross Trade Amount

      For Derivatives: Contract Value Factor by which price must be adjusted to determine the true nominal value of one futures/options contract.
      (Qty * Price) * Factor = Nominal Value"
  orderStatusHistoryList:
    items:
      $ref: 'orderStatusHistory.yaml'
