type: object
required:
  - accounts
  - clientAllocationIdentification
  - amount
properties:
  accounts:
    type: array
    items:
      $ref: '../Resources/account.yaml'
  clientAllocationIdentification:
    type: string
    description: Unambiguous identifier for the individual allocation of the bulk order, as assigned by the instructing party.
    example: '321321321'
  amount:
    description: Quantity to be allocated to specific safekeeping account
    $ref: 'amount.yaml'
  swapNearQuantity:
    description: quantity for near leg of swap to be allocated to specific safekeeping account, for FX currency swap only
    $ref: 'orderQuantity.yaml'
  swapFarQuantity:
    description: quantity of far leg of swap to be allocated to specific safekeeping account, for FX currency swap only
    $ref: 'orderQuantity.yaml'

