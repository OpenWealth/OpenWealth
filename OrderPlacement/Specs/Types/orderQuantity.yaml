type: object
description: Ordered quantity.
required:
  - amount
  - type
properties:
  amount:
    $ref: 'amount.yaml'
  type:
    type: string
    description: Type of the amount.
    example: unitsNumber
    enum:
      - unitsNumber
      - nominal
  unitReference:
    type: string
    description: indicates whether the order quantity is expressed in base instrument or quote instrument. BaseInstrument by default
    enum:
      - baseInstrument
      - quoteInstrument