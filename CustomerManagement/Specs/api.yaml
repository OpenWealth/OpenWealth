######################
# Components
######################

components:
  parameters:
    temporaryId:
      name: temporaryId
      in: path
      required: true
      description: ID (e.g. customer / prospect / person / order) to get a status update on the order
      schema:
        type: string
    customerId:
      name: customerId
      in: path
      required: true
      description: Customer ID
      schema:
        type: string
    personId:
      name: personId
      in: path
      required: true
      description: Person ID
      schema:
        type: string
    contactId:
      name: contactId
      in: path
      required: true
      description: Contact detail ID
      schema:
        type: string
    addressId:
      name: addressId
      in: path
      required: true
      description: Address ID
      schema:
        type: string
    documentId:
      name: documentId
      in: path
      required: true
      description: Document ID
      schema:
        type: string
    limit:
      name: limit
      in: query
      description: Maximum number of items to return.
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1

  schemas:
    customerIdResponse:
      type: object
      description: Response consisting of an ID (e.g. Customer / Prospect / Order ID) so that status updates regarding the customer onboarding can be obtained.
      required:
        - temporaryId
      properties:
        temporaryId:
          $ref: '#/components/schemas/temporaryId'
        externalReference:
          $ref: 'Types/externalReference.yaml'

    personIdResponse:
      type: object
      description: Response consisting of an ID (Person / Prospect / Order ID) so that status updates regarding the opening of a person can be obtained.
      required:
        - temporaryId
      properties:
        temporaryId:
          $ref: '#/components/schemas/temporaryId'
        externalReference:
          $ref: 'Types/externalReference.yaml'

    contactResponse:
      type: object
      properties:
        contactId:
          type: string

    documentResponse:
      type: object
      properties:
        documentId:
          type: string

    addressResponse:
      type: object
      properties:
        addressId:
          type: string

    kycResponse:
      type: object
      description: Response consisting of an ID (e.g. Customer / KYC ID) so that status updates regarding the creation of a new KYC can be obtained.
      required:
        - temporaryId
      properties:
        temporaryId:
          $ref: '#/components/schemas/temporaryId'
        externalReference:
          $ref: 'Types/externalReference.yaml'

    status:
      type: object
      description: Status of an order inlcuding the order ID and the status of the order.
      required:
        - temporaryId
        - currentStatus
      properties:
        temporaryId:
          $ref: '#/components/schemas/temporaryId'
        currentStatus:
          type: string
          enum:
            - open
            - inProgress
            - rejected
            - done
          description: Current status of an order (e.g.customer onboarding to get an update if a customer object already has been opened or not).
          example: done
        permanentId:
          $ref: '#/components/schemas/permanentId'

    temporaryId:
      type: string
      minLength: 1
      maxLength: 35
      description: Some kind of ID (Customer/Person/Prospect/Order/Task ID) so that a status update can be obtained (e.g. customer onboarding).
      example: 2130040

    permanentId:
      type: string
      minLength: 1
      maxLength: 35
      description: Some kind of permanent ID (Customer/Person/Prospect etc.) so that an object can be identified.
      example: 23000454

    prospectId:
      type: object
      properties:
        temporaryId:
          $ref: '#/components/schemas/temporaryId'

    prospectResponse:
      type: object
      required:
        - temporaryId
        - response
      properties:
        temporaryId:
          $ref: '#/components/schemas/temporaryId'
        response:
          type: string
          enum:
            - open
            - denied
            - accepted
            - pleaseContactBankAdvisor
          description: Result of the conducted prospect pre-check. The result is in no way binding and may change during the process.
          example: accepted
