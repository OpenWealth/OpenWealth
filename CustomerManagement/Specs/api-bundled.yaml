          type: string
          minLength: 1
          maxLength: 35
          readOnly: true
          description: Unique address ID assigned by the custody bank
          example: 12345678
        externalReference:
          $ref: '#/components/schemas/externalReference'
        addressName:
          type: string
          description: Name of the address object
          example: Mustergasse 15, 8001 Zürich, Schweiz
