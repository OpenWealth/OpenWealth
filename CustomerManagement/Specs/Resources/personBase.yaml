type: object
required:
  - personId
  - language
  - personType
  - countryOfDomicile
properties:
  personId:
    type: string
    minLength: 1
    maxLength: 35
    description: Unique person ID assigned by the custody bank
    example: 123-456-214
  externalReference:
    $ref: '../Types/externalReference.yaml'
  language:
    $ref: '../Types/language.yaml'
  countryOfDomicile:
    $ref: '../Types/country.yaml'
  openingDate:
    $ref: '../../../Globals/Types/Date.yaml'
  taxDomicileList:
    type: array
    items:
      $ref: '../Types/country.yaml'
  personType:
    type: string
    enum:
      - naturalPerson
      - legalPerson
      - personAssociation
    example: naturalPerson
    description: Indicates the person type (e.g. Natural Person) of the person object
